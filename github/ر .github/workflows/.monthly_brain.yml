name: Monthly AI Self-Correction

on:
  schedule:
    - cron: '0 0 1 * *' # ساعت ۰۰:۰۰ بامداد روز اول هر ماه میلادی
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install Dependencies
      run: pip install pandas sqlite3
    - name: Run AI Engine
      run: python src/brain.py
    # اگر گزارشی تولید شد، آن را روی گیت‌هاب شما آپلود می‌کند تا دانلود کنید و بخوانید
    - name: Upload Report
      uses: actions/upload-artifact@v4
      with:
        name: monthly-trading-report
        path: monthly_optimization_report.md
