name: Walk-Forward Analysis (Honest OOS Test)
on:
  workflow_dispatch:
    inputs:
      strategy_mode:
        description: 'حالت استراتژی برای تست'
        required: true
        default: 'mean_reversion'
        type: choice
        options:
          - mean_reversion
          - breakout
jobs:
  walk_forward:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas numpy requests

      - name: Fetch Market Data
        run: python fetcher.py

      - name: Run Walk-Forward Analysis
        env:
          STRATEGY_MODE: ${{ github.event.inputs.strategy_mode }}
        run: |
          echo "🔬 اجرا با STRATEGY_MODE=${STRATEGY_MODE}"
          python src/walk_forward.py

      - name: Show Results Summary
        if: always()
        run: |
          echo "=== data/walk_forward_results_${STRATEGY_MODE}.csv ==="
          cat "data/walk_forward_results_${{ github.event.inputs.strategy_mode }}.csv" || echo "فایل نتایج یافت نشد!"

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: walk-forward-results-${{ github.event.inputs.strategy_mode }}
          path: data/walk_forward_results_*.csv
