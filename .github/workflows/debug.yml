- name: Debug Score
  run: |
    python -c "
    import sys, logging
    logging.basicConfig(level=logging.INFO, format='%(message)s')
    sys.path.insert(0, '.')
    import pandas as pd, config
    from src.indicators import TechnicalIndicators
    from src.backtester import _compute_scores

    df = pd.read_csv('data/4h/BTCUSDT_history.csv')
    df_norm = df.rename(columns={c: c.lower() for c in df.columns})
    df_full, _ = TechnicalIndicators.calculate_all_features(df_norm, symbol='BTCUSDT')

    print('MIN_REQUIRED_SCORE:', config.MIN_REQUIRED_SCORE)
    for i in range(200, 210):
        candle = df_full.iloc[i]
        a, r, e = _compute_scores(candle, config.ADX_THRESHOLD)
        total = (50.0*0 + a*20 + r*20 + e*20) / 60
        print(f'کندل {i}: ADX={a:.1f} RSI={r:.1f} EMA={e:.1f} total={total:.1f}')
    "
