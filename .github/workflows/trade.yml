# ---------------------------------------------------------
# FILE PATH: .github/workflows/trade.yml (نسخه کنترل دستی و اسکنر واقعی)
# ---------------------------------------------------------
name: trade

on:
  push:
    branches:
      - main
  workflow_dispatch: # 👈 قابلیت کلیدی: دکمه اجرای دستی را در پنل گیت‌هاب فعال می‌کند

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        uses: actions/checkout@v4

      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      - name: Run actions/setup-python@v5
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set Permissions
        run: chmod +x main.py

      # ⚡ اجرای اسکریپت اصلی ربات برای اسکن واقعی ۱۱ جفت‌ارز بازار به صورت ایمن
      - name: Run Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and Push Database & AI Parameters
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add trading_bot.db src/models/ || true
          git commit -m "chore: auto-update live database and weights [skip ci]" || true
          git push origin main || true
