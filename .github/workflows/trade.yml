# ---------------------------------------------------------
# FILE PATH: .github/workflows/trade.yml (نسخه کنترل دستی و اسکنر واقعی)
# ---------------------------------------------------------
name: trade

on:
  push:
    branches:
      - main
  workflow_dispatch: # 👈 قابلیت کلیدی: دکمه اجرای دستی را در پنل گیت‌هاب فعال می‌کند

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ⚡ اجرای اسکریپت اصلی ربات برای اسکن واقعی جفت‌ارزهای بازار
      - name: Run Bot
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit and Push AI Parameters
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f "best_params.json" ]; then
            git add best_params.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update AI parameters [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to commit."
          fi
