name: Run Backtester and Optimizer
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt numpy joblib yfinance lightgbm psycopg2-binary SQLAlchemy

      - name: Fetch Market Data
        run: |
          python fetcher.py

      - name: Verify CSV Files
        run: |
          python -c "
          import os, sys, glob, pandas as pd
          data_dir = os.path.join(os.getcwd(), 'data', '4h')
          watchlist = ['BTCUSDT','ETHUSDT','SOLUSDT','DOTUSDT','LINKUSDT','AVAXUSDT','XRPUSDT','LTCUSDT','BCHUSDT','ATOMUSDT']
          missing = []
          for sym in watchlist:
              path = os.path.join(data_dir, f'{sym}_history.csv')
              if not os.path.exists(path):
                  missing.append(sym)
                  print(f'MISSING: {sym}')
              else:
                  df = pd.read_csv(path)
                  print(f'OK {sym}: {len(df)} rows')
          if missing:
              sys.exit(1)
          print('All files ready')
          "

      - name: Patch backtester ai_score default
        run: |
          python -c "
          path = 'src/backtester.py'
          with open(path, 'r', encoding='utf-8') as f:
              src = f.read()

          if 'ai_score    = 50.0' in src:
              print('Already patched')
          elif 'ai_score    = 0.0' in src:
              src = src.replace('ai_score    = 0.0', 'ai_score    = 50.0', 1)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(src)
              print('Patched: ai_score 0.0 -> 50.0')
          else:
              print('Pattern not found - checking file')
              import re
              m = re.findall(r'ai_score\s*=\s*[\d.]+', src)
              print('Found:', m)

          with open(path, 'r') as f:
              content = f.read()
          for line in content.split('\n'):
              if 'ai_score' in line and '=' in line and 'approved' not in line and 'w_ai' not in line:
                  print('LINE:', line.strip())
                  break
          "

      - name: Verify Patch
        run: |
          echo "=== ai_score lines in backtester ==="
          grep -n "ai_score\s*=" src/backtester.py | head -5

      - name: Execute Pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          rm -f data/backtest_trades.csv

          echo "▶️ backtester..."
          python src/backtester.py
          echo "✅ backtester done"

          echo "=== backtest_table_summary.csv ==="
          cat backtest_table_summary.csv || echo "FILE NOT FOUND"

          echo "▶️ train_model..."
          python src/train_model.py
          echo "✅ train_model done"

          echo "▶️ optimizer..."
          python src/optimizer.py
          echo "✅ optimizer done"

      - name: Commit Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add -f backtest_table_summary.csv  || true
          git add -f best_params.json            || true
          git add -f data/trading_bot_backtest.db || true
          git add -f training_results.json       || true
          git add -f src/models/                 || true
          git add src/backtester.py              || true
          git status
          git diff --cached --stat
          git commit -m "Auto-update: Backtest + Train + Optimize $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push origin HEAD:${{ github.ref_name }} --force

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            backtest_table_summary.csv
            best_params.json
            training_results.json
            data/trading_bot_backtest.db
