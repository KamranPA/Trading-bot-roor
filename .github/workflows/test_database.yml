name: 🗄️ Test Database Connection

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - 'src/database.py'
      - 'test_db_full.py'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'src/database.py'

jobs:
  test-database:
    name: 🧪 Test Supabase Connection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    environment: production
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          # نصب مستقیم وابستگی‌های مورد نیاز
          pip install psycopg2-binary python-dotenv
          # اگر requirements.txt وجود دارد، آن را هم نصب کن
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          fi
          # نمایش لیست ماژول‌های نصب شده برای دیباگ
          pip list
      
      - name: 🔍 Debug - Check environment
        run: |
          echo "🔍 بررسی متغیرهای محیطی"
          echo "DATABASE_URL exists: ${{ secrets.DATABASE_URL != '' }}"
          echo "Current directory: $(pwd)"
          echo "Files: $(ls -la)"
          echo "Python packages:"
          python -c "import sys; print(sys.path)"
      
      - name: 🏗️ Create test directory structure
        run: |
          mkdir -p src
          # کپی فایل database.py به src اگر وجود ندارد
          if [ -f database.py ]; then
            cp database.py src/ || true
          fi
          if [ -f src/database.py ]; then
            echo "✅ src/database.py found"
          else
            echo "⚠️ src/database.py not found - checking root"
            ls -la *.py || true
          fi
          
          # کپی فایل تست به ریشه اگر در جای دیگری است
          if [ -f test_db_full.py ]; then
            echo "✅ test_db_full.py found in root"
          else
            echo "⚠️ test_db_full.py not found in root"
            find . -name "test_db_full.py" || true
          fi
      
      - name: 🗄️ Test Database Connection
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🔍 شروع تست دیتابیس..."
          # اجرای مستقیم با Python بدون نیاز به dotenv
          python test_db_full.py
      
      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: db-test-results
          path: |
            test_results.txt
            db_test.log
          retention-days: 7
      
      - name: 📝 Show test summary
        if: always()
        run: |
          echo "📊 خلاصه تست:"
          if [ -f test_results.txt ]; then
            cat test_results.txt
          else
            echo "⚠️ فایل نتایج یافت نشد"
          fi
          
          if [ -f db_test.log ]; then
            echo "📋 آخرین خطوط لاگ:"
            tail -20 db_test.log
          fi
