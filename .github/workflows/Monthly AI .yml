name: Monthly AI Self-Correction

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with: {python-version: '3.11'}
    - name: Install
      run: pip install pandas requests ccxt
      
    - name: Fetch Data
      run: |
        python fetcher.py
        # بررسی اینکه آیا فایل‌ها ساخته شدند
        ls -la data/historical
        if [ -z "$(ls -A data/historical)" ]; then echo "❌ دیتا دانلود نشد"; exit 1; fi

    - name: Backtest
      run: python backtester.py

    - name: Commit
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add data/trading_bot.db
        git commit -m "Update" || echo "No changes"
        git push
