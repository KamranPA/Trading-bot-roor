name: Monthly AI

on:
  workflow_dispatch: # اجرای دستی برای تست

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # اجازه نوشتن در مخزن برای کامیت
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests ccxt

    - name: Fetch Data
      run: |
        echo "Creating data directory..."
        mkdir -p data/historical
        echo "Running fetcher.py..."
        python fetcher.py
        
        # بررسی دقیق: آیا فایل‌های CSV در مسیر درست ساخته شدند؟
        echo "Listing files in data/historical:"
        ls -la data/historical
        
        # اگر لیست فایل‌ها خالی باشد، ربات متوقف می‌شود تا گزارش اشتباه تولید نشود
        if [ -z "$(ls -A data/historical)" ]; then
          echo "❌ خطا: هیچ دیتایی دانلود نشد!"
          exit 1
        fi

    - name: Backtest
      run: |
        python backtester.py
        if [ ! -f "backtest_summary.txt" ]; then
          echo "❌ خطا: گزارش بکتست تولید نشد!"
          exit 1
        fi

    - name: Commit and Push Results
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        # استفاده از -f برای عبور از .gitignore در صورتی که فایل‌ها قبلاً نادیده گرفته شده بودند
        git add -f data/trading_bot.db backtest_summary.txt
        # اگر تغییری وجود داشت کامیت کن، در غیر این صورت ادامه بده
        git commit -m "🧠 AI Update: DB & Report Refined" || echo "No changes to commit"
        git push
