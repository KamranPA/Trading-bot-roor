name: Monthly AI

on:
  schedule:
    - cron: '0 0 1 * *' # اجرای خودکار در ساعت ۰۰:۰۰ روز اول ماه
  workflow_dispatch: # برای اجرای دستی (تست)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # اجازه نوشتن در مخزن برای ثبت گزارش و دیتابیس

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Fetch Data
      run: |
        echo "Creating data directory..."
        mkdir -p data/historical
        echo "Running fetcher.py..."
        python fetcher.py
        
        # بررسی حیاتی: اگر دیتا دانلود نشد، پایپ‌لاین متوقف شود
        if [ -z "$(ls -A data/historical)" ]; then
          echo "❌ خطا: هیچ فایلی در پوشه historical یافت نشد!"
          exit 1
        fi

    - name: Run Backtest
      run: |
        python backtester.py
        # بررسی اینکه گزارش حتما تولید شده باشد
        if [ ! -f "backtest_summary.txt" ]; then
          echo "❌ خطا: فایل گزارش backtest_summary.txt تولید نشد!"
          exit 1
        fi

    - name: Commit and Push Results
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # استفاده از -f (Force) برای دور زدن .gitignore و اجبار به آپلود
        git add -f data/trading_bot.db
        git add -f backtest_summary.txt
        git add -f data/historical/*.csv
        if [ -d "src/models" ]; then git add -f src/models/*.pkl; fi
        
        # کامیت تغییرات (اگر تغییری نبود، اسکریپت با خطا بسته نشود)
        if git diff --staged --quiet; then
          echo "هیچ تغییر جدیدی یافت نشد."
        else
          git commit -m "🧠 AI Update: DB, Report & Models [Skip CI]"
          git push
        fi
