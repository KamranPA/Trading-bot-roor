name: Monthly AI 
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Run Pipeline
      run: |
        python fetcher.py
        python backtester.py

    - name: Commit and Push
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # استفاده از دستورات هوشمند برای جلوگیری از خطای 128
        git add -f data/trading_bot.db backtest_summary.txt data/historical/*.csv
        if [ -d "src/models" ] && ls src/models/*.pkl >/dev/null 2>&1; then
          git add -f src/models/*.pkl
        fi
        
        # کامیت فقط در صورت وجود تغییرات
        if git diff --staged --quiet; then
          echo "No changes to commit."
        else
          git commit -m "🧠 AI Update: DB, Report & Data"
          git push
        fi
