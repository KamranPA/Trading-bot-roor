name: Monthly AI Brain Update

on:
  schedule:
    - cron: '0 0 1 * *' # اجرای خودکار در روز اول هر ماه
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests ccxt scikit-learn numpy joblib

      - name: Run AI Training
        run: |
          python -c "from src.train_model import train_all; train_all()"

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data/models/
          git commit -m "Auto-update AI model" || echo "No changes to commit"
          git push
