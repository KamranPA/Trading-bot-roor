name: Monthly AI Self-Correction & Reporting

on:
  workflow_dispatch: # اجرای دستی برای تست و اجرای خودکار

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # اجازه دسترسی برای کامیت کردن نتایج
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Fetch Data
      run: |
        echo "Creating data directory..."
        mkdir -p data/historical
        echo "Running fetcher.py..."
        python fetcher.py
        
        # بررسی اینکه آیا فایل‌ها واقعا ساخته شدند
        ls -la data/historical
        if [ -z "$(ls -A data/historical)" ]; then
          echo "❌ خطا: هیچ فایلی دانلود نشد!"
          exit 1
        fi

    - name: Backtest
      run: |
        python backtester.py
        # بررسی اینکه گزارش حتما تولید شده باشد
        if [ ! -f "backtest_summary.txt" ]; then
          echo "❌ خطا: گزارش بکتست تولید نشد!"
          exit 1
        fi

    - name: Commit and Push Results
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # استفاده از -f (Force) برای دور زدن .gitignore
        # افزودن دیتابیس، گزارش و فایل‌های CSV دیتای تاریخی
        git add -f data/trading_bot.db backtest_summary.txt data/historical/*.csv
        
        # کامیت تغییرات (اگر تغییری نبود، اسکریپت با خطا بسته نشود)
        git commit -m "🧠 AI Update: DB, Report & Historical Data [Skip CI]" || echo "No changes to commit"
        git push
