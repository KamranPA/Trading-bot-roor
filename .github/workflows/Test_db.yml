name: Test Cloud Database Connection

on:
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: pip install psycopg2-binary
      - name: Force IPv4 and Test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
          import socket, psycopg2, os
          # تبدیل هاست به IP عددی (IPv4)
          host = 'db.zssmszspbfnvxpjzshhd.supabase.co'
          ip = socket.getaddrinfo(host, 6543, family=socket.AF_INET)[0][4][0]
          print(f'Connecting to {host} via IPv4: {ip}')
          
          # جایگزینی هاست با IP در کانکشن استرینگ
          url = os.environ['DATABASE_URL'].replace(host, ip)
          try:
              conn = psycopg2.connect(url + '?sslmode=require')
              print('✅ اتصال موفقیت‌آمیز با IPv4!')
              conn.close()
          except Exception as e:
              print(f'❌ خطا: {e}')
              exit(1)
          "
