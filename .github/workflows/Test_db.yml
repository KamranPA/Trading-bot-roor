name: Test Cloud Database Connection

on:
  workflow_dispatch: # اجرای دستی از تب Actions

jobs:
  test-connection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install psycopg2-binary pandas

      - name: Run Connection Test
        env:
          # اطمینان حاصل کنید که DATABASE_URL در Secrets تعریف شده باشد
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
          import os
          import psycopg2
          try:
              conn = psycopg2.connect(os.environ['DATABASE_URL'])
              print('✅ اتصال به Supabase با موفقیت برقرار شد!')
              conn.close()
          except Exception as e:
              print(f'❌ خطا در اتصال: {e}')
              exit(1)
          "
