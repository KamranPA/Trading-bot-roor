name: Daily Momentum Bot (BTC/ETH, Signal-Only)
on:
  schedule:
    # ۱۰ دقیقه بعد از نیمه‌شب UTC — اطمینان از بسته‌شدن کندل روزانه‌ی قبلی
    - cron: '10 0 * * *'
  workflow_dispatch:
jobs:
  momentum:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests psycopg2-binary

      - name: Run Daily Momentum Bot
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python momentum_bot.py
