name: Daily Bot Status Check

on:
  schedule:
    - cron: '0 8 * * *' # هر روز ساعت ۱۱:۳۰ صبح به وقت ایران (۰۸:۰۰ به وقت UTC)
  workflow_dispatch: # دکمه اجرای دستی از داخل گیت‌هاب

jobs:
  ping_telegram:
    runs-on: ubuntu-latest
    steps:
    - name: Send Status Message to Telegram
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        format: markdown
        message: |
          🟢 *گزارش سلامت سیستم*
          ━━━━━━━━━━━━━━━
          🤖 ربات با موفقیت در حال اجراست.
          ⏰ وضعیت: فعال و در حال اسکن بازار
          🔍 ارزهای تحت نظر: BTC, ETH, SOL

          ✓ همه‌چیز مرتب است.
