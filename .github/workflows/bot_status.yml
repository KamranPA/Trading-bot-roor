name: Daily Bot Status Check

on:
  schedule:
    - cron: '0 8 * * *' # ⏱️ هر روز ساعت ۸:۰۰ صبح به وقت گرینویچ (ساعت ۱۱:۳۰ صبح به وقت ایران)
  workflow_dispatch: # فعال بودن دکمه اجرای دستی برای تست

jobs:
  ping_telegram:
    runs-on: ubuntu-latest
    steps:
    - name: Send Heartbeat Message to Telegram
      env:
        TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        curl -s -X POST "https://api.telegram.com/bot$TOKEN/sendMessage" \
        -d chat_id="$CHAT_ID" \
        -d text="🟢 **گزارش سلامت سیستم**%0A━━━━━━━━━━━━━━━%0A🤖 ربات تریدر کامران با موفقیت در حال اجراست.%0A⏰ وضعیت: فعال و در حال اسکن بازار (تایم‌فریم 4H)%0A🔍 ارزهای تحت نظر: BTC, ETH, SOL%0A%0A✓ همه‌چیز مرتب است؛ در صورت رویت موقعیت، سیگنال صادر خواهد شد." \
        -d parse_mode="Markdown"
