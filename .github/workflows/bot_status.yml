name: Daily Bot Status Check

on:
  schedule:
    - cron: '0 8 * * *' # هر روز ساعت ۱۱:۳۰ صبح به وقت ایران
  workflow_dispatch:

jobs:
  ping_telegram:
    runs-on: ubuntu-latest
    steps:
    - name: Send Heartbeat Message to Telegram
      env:
        TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        MESSAGE: "🟢 *گزارش سلامت سیستم*\n\n🤖 ربات با موفقیت در حال اجراست.\n⏰ وضعیت: فعال و در حال اسکن بازار\n🔍 ارزها: BTC, ETH, SOL\n\n همه‌چیز مرتب است."
      run: |
        curl -s -X POST "https://api.telegram.com/bot$TOKEN/sendMessage" \
          -d "chat_id=$CHAT_ID" \
          --data-urlencode "text=$MESSAGE" \
          -d "parse_mode=Markdown"
