name: Monthly AI Self-Correction

on:
  schedule:
    - cron: '0 0 1 * *' # ساعت ۰۰:۰۰ بامداد روز اول هر ماه میلادی
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests

    - name: Run AI Engine
      run: python src/brain.py
      
    - name: Commit and Push Strategy Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "github-actions[bot]"
        git add config.py
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 هوش آماری: بهینه‌سازی خودکار پارامترهای استراتژی [skip ci]" && git push)
