name: Monthly AI Self-Correction

on:
  schedule:
    # اجرای خودکار در اول هر ماه میلادی ساعت 00:00
    - cron: '0 0 1 * *'
  workflow_dispatch: # امکان اجرای دستی سیستم برای تست و عیب‌یابی سریع

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run AI Engine
      run: python -m src.brain

    # کامیت و ذخیره تغییرات احتمالی کانفیگ یا دیتابیس پس از اجرای مغز سیستم
    - name: Commit and Push Strategy Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add data/trading_bot.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "🧠 هوش مصنوعی: فیلترها و استراتژی سیستم بهینه‌سازی شد" && git push)
