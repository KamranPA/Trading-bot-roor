name: Monthly AI Self-Correction

on:
  schedule:
    # اجرای خودکار در اول هر ماه میلادی ساعت 00:00 به وقت UTC
    - cron: '0 0 1 * *'
  workflow_dispatch: # امکان اجرای دستی سیستم برای تست و عیب‌یابی سریع

# اضافه کردن مجوز نوشتن برای ذخیره تغییرات کانفیگ و دیتابیس
permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests pandas; fi

    - name: Run AI Engine
      run: python -m src.brain

    # کامیت و ذخیره تغییرات احتمالی کانفیگ و دیتابیس پس از اجرای مغز سیستم
    - name: Commit and Push Strategy Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # ثبت هر دو فایل تغییر یافته (دیتابیس و فایل تنظیمات)
        git add data/trading_bot.db config.py
        
        # بررسی اینکه آیا اصلاً تغییری رخ داده است یا خیر؛ در صورت وجود تغییر، کامیت و پوش انجام می‌شود
        git diff --quiet && git diff --staged --quiet || (git commit -m "🧠 هوش مصنوعی: فیلترها و استراتژی سیستم بهینه‌سازی شد [Skip CI]" && git push)
