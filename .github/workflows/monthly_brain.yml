name: Monthly AI Retrain Pipeline

on:
  schedule:
    - cron: '0 0 1 * *'  # اجرای خودکار در دقیقه 0، ساعت 0، روز اول هر ماه میلادی
  workflow_dispatch:     # امکان اجرای دستی از تب Actions گیت‌هاب

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true  # 🛠️ اصلاح: برای حفظ مجوزهای دسترسی در گام Git Push

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # 🛠️ اصلاح: scikit-learn حذف و صرفاً پکیج‌های سبک و حیاتی ربات شما قرار گرفتند
        pip install pandas numpy joblib lightgbm

    - name: Execute Machine Learning Training (Monthly Mode)
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python src/train_model.py --monthly

    - name: Commit and Push Upgraded Models
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        
        if ls src/models/*.pkl >/dev/null 2>&1; then
          git add -f src/models/*.pkl
          echo "✅ AI Models detected."
        fi
        
        if git diff --cached --quiet; then
          echo "No changes detected."
        else
          git commit -m "🧠 Monthly Brain Upgrade: AI models learned from live trades."
          # 🛠️ اصلاح: استفاده از آدرس اوریجین مجهز به توکن برای عبور از سدهای امنیتی گیت‌هاب
          git push origin HEAD:${{ github.ref_name }}
        fi

    - name: Send Notification to Telegram
      if: success()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        curl -s -X POST https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage \
        -d chat_id=$TELEGRAM_CHAT_ID \
        -d parse_mode=HTML \
        -d text="🧠 <b>ارتقای هوش مصنوعی انجام شد!</b>%0A━━━━━━━━━━━━━━━%0A✅ مدل‌های اختصاصی ارزها با تکیه بر تجربیات ماه اخیر با موفقیت بازآموزی شدند.%0A🚀 <i>ربات شما حالا یک نسخه باهوش‌تر است.</i>"
