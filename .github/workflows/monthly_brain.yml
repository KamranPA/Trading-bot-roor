# .github/workflows/monthly_brain.yml
# زنجیره متصل بکتست، تغذیه دیتابیس، بازآموزی مدل ۱۰‌بعدی هوش مصنوعی و گزارش تلگرام

name: Monthly AI Self-Correction & Reporting

on:
  schedule:
    - cron: '0 0 1 * *' # اجرای خودکار در اول هر ماه میلادی
  workflow_dispatch: # امکان اجرای دستی در هر زمان با زدن دکمه Run workflow

permissions:
  contents: write # مجوز ویرایش و کامیت دیتابیس و مدل روی ریپازیتوری

jobs:
  optimize-and-report:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ۱. اجرای بکتست برای تولید داده‌های تاریخی و تزریق ۱۲۰ معامله به دیتابیس در همین سرور
    - name: Run Backtest Engine & Populate Database
      run: python backtester.py

    # ۲. تغذیه مستقیم هوش مصنوعی از دیتابیس پر شده در گام قبل
    - name: Run AI Engine (Surgical Loss Analysis & Retraining)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python src/train_model.py

    # ۳. ارسال کارنامه نهایی پر شده به تلگرام
    - name: Generate & Send Telegram Performance Report
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python -c "from src import telegram_bot; telegram_bot.send_performance_report()"

    # ۴. کامیت و ذخیره دیتابیس و مغز الکترونیکی هوش مصنوعی روی گیت‌هاب شما
    - name: Commit and Push Strategy, Model & Database Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # ایجاد پوشه مدل در صورت عدم وجود
        mkdir -p src/models
        
        # اضافه کردن فایل دیتابیس پر شده و مدل هوش مصنوعی pkl به گیت
        git add data/trading_bot.db config.py
        if [ -f "src/models/trading_filter_model.pkl" ]; then git add src/models/trading_filter_model.pkl; fi
        
        # ثبت تغییرات در صورتی که فایل جدیدی تولید شده باشد
        git diff --quiet && git diff --staged --quiet || (git commit -m "🧠 هوش مصنوعی: مدل ۱۰‌بعدی بر اساس ۱۲۰ معامله بکتست بازآموزی و کامیت شد [Skip CI]" && git push)
