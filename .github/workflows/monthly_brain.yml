name: Monthly AI Retrain Pipeline

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies for LightGBM
      run: |
        sudo apt-get update
        sudo apt-get install -y libgomp1

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy joblib lightgbm scikit-learn psycopg2-binary

    - name: Execute Machine Learning Training (Monthly Mode)
      env:
        PYTHONPATH: ${{ github.workspace }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }} # 🟢 اتصال به ابر
      run: |
        python src/train_model.py --monthly

    - name: Commit and Push Upgraded Models
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        
        # فقط فایل‌های مدل و پارامترها را اضافه می‌کنیم؛ مدل‌ها در src/models قرار دارند
        # و در .gitignore هستند، پس با -f اجباری اضافه می‌شوند.
        git add best_params.json
        git add -f src/models/*.pkl 2>/dev/null || echo "No model files to add."
        
        if git diff --cached --quiet; then
          echo "No changes detected."
        else
          git commit -m "🧠 Monthly Brain Upgrade: AI models learned from live trades."
          git push origin HEAD:${{ github.ref_name }}
        fi

    - name: Send Notification to Telegram
      if: success()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        curl -s -X POST https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage \
        -d chat_id=$TELEGRAM_CHAT_ID \
        -d parse_mode=HTML \
        -d text="🧠 <b>ارتقای هوش مصنوعی انجام شد!</b>%0A━━━━━━━━━━━━━━━%0A✅ مدل‌های اختصاصی ارزها با تکیه بر تجربیات ماه اخیر با موفقیت بازآموزی شدند.%0A🚀 <i>ربات شما حالا یک نسخه باهوش‌تر است.</i>"
