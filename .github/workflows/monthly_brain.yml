name: Monthly AI Retrain Pipeline

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    # مرحله کلیدی: دانلود دیتابیس از ورک‌فلوی اصلی
    - name: Download Latest Database
      uses: dawidd6/action-download-artifact@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        workflow: core_trading_bot.yml
        name: bot-runtime-state
        path: .
      continue-on-error: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Machine Learning Training
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python src/train_model.py

    - name: Commit and Push Updated Model
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        if [ -f "src/models/trading_filter_model.pkl" ]; then
          git add src/models/trading_filter_model.pkl
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 آپدیت مدل هوش مصنوعی"
          git push
        fi
