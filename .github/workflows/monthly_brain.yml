# File Path: .github/workflows/monthly_brain.yml
name: Monthly AI Brain Re-Training

on:
  schedule:
    # اجرا در ساعت 00:00 اولین روز هر ماه میلادی
    - cron: '0 0 1 * *'
  workflow_dispatch: # امکان اجرای دستی از پنل گیت‌هاب

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Database Artifact
        uses: actions/download-artifact@v4
        with:
          name: bot-database
          path: data/
        continue-on-error: true # اگر در اولین ماه‌ها آرتیفکتی نباشد خطا ندهد

      - name: Run AI Training
        env:
          PYTHONPATH: ${{ github.workspace }}
        # اصلاح شد: نام متد فراخوانی شده مطابق با تابع واقعی داخل فایل train_model.py به train_ai_model تغییر یافت.
        run: |
          python -c "from src.train_model import train_ai_model; train_ai_model()"

      - name: Upload Updated Model and Assets
        uses: actions/upload-artifact@v4
        with:
          name: ai-model-assets
          path: |
            ml_models/
            data/
          retention-days: 90
