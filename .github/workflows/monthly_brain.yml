# .github/workflows/monthly_brain.yml
# سیستم خودکار جراحی معاملات، بهینه‌سازی فیلترهای استراتژی و ارسال گزارش عملکرد ماهانه به تلگرام

name: Monthly AI Self-Correction & Reporting

on:
  schedule:
    - cron: '0 0 1 * *' # اجرای خودکار دقیقاً در ساعت ۰۰:۰۰ اول هر ماه میلادی
  workflow_dispatch: # امکان اجرای دستی در هر زمان با زدن دکمه Run workflow از داخل گیت‌هاب

permissions:
  contents: write # مجوز حیاتی برای ذخیره و Push کردن تغییرات کانفیگ و دیتابیس روی ریپازیتوری

jobs:
  optimize-and-report:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run AI Engine (Surgical Loss Analysis)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python -m src.brain # اجرای مغز سیستم جهت کالبدشکافی معاملات و اصلاح فیلترهای استراتژی

    - name: Generate & Send Telegram Performance Report
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # فراخوانی متد گزارش‌دهی جدید از طریق مفسر خط فرمان پایتون
        python -c "from src import telegram_bot; telegram_bot.send_performance_report()"

    - name: Commit and Push Strategy & Database Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # اضافه کردن دیتابیس و فایل تنظیمات به محیط گیت جهت ذخیره‌سازی ابدی
        git add data/trading_bot.db config.py
        
        # بررسی اینکه آیا هوش مصنوعی تغییری در فیلترها اعمال کرده است یا خیر؛ در صورت وجود تغییر، آن را Push می‌کند
        git diff --quiet && git diff --staged --quiet || (git commit -m "🧠 هوش مصنوعی: فیلترها بهینه‌سازی و کارنامه ماهانه صادر شد [Skip CI]" && git push)
