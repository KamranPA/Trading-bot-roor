name: Monthly AI Retrain Pipeline

permissions:
  contents: write

on:
  schedule:
    # اجرا در روز اول هر ماه در ساعت ۰۰:۰۰ نیمه‌شب
    - cron: '0 0 1 * *'
  workflow_dispatch: # امکان اجرای دستی برای تست

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn numpy joblib

    - name: Execute Machine Learning Training (Monthly Mode)
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        # فراخوانی اسکریپت با آرگومان --monthly برای ترکیب تجربه‌های لایو و گذشته
        python src/train_model.py --monthly

    - name: Commit and Push Upgraded Models
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        
        # اجبار گیت به افزودن تمام مدل‌های هوش مصنوعی ارتقا یافته
        if ls src/models/*.pkl >/dev/null 2>&1; then
          git add -f src/models/*.pkl
          echo "✅ Upgraded AI Models detected and added to git stash."
        else
          echo "⚠️ No AI models (.pkl) generated. Skipping."
        fi
        
        if git diff --cached --quiet; then
          echo "No changes detected, skipping commit."
        else
          git commit -m "🧠 Monthly Brain Upgrade: AI models learned from recent live mistakes & successes."
          git push
        fi
