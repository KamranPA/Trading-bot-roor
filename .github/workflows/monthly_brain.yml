# .github/workflows/monthly_brain.yml
name: Monthly AI Self-Correction & Reporting

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize-and-report:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ⚡ گام طلایی و مفقوده: دانلود داده‌های تاریخی صرافی و ساخت فایل‌های CSV
    - name: Fetch Historical Market Data (CSV Generator)
      run: |
        # اگر نام اسکریپت دانلود دیتای شما چیزی غیر از fetcher.py است، نام آن را اینجا اصلاح کنید
        if [ -f "src/fetcher.py" ]; then python src/fetcher.py; elif [ -f "fetcher.py" ]; then python fetcher.py; fi

    # ۲. اجرای بکتست روی فایل‌های CSV دانلود شده در گام قبل
    - name: Run Backtest Engine & Populate Database
      run: python backtester.py

    # ۳. تغذیه هوش مصنوعی از دیتابیس پر شده
    - name: Run AI Engine (Surgical Loss Analysis & Retraining)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python src/train_model.py

    # ۴. ارسال کارنامه نهایی به تلگرام
    - name: Generate & Send Telegram Performance Report
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python -c "from src import telegram_bot; telegram_bot.send_performance_report()"

    # ۵. کامیت و آپدیت تغییرات در گیت‌هاب
    - name: Commit and Push Strategy, Model & Database Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        mkdir -p src/models data
        git add data/trading_bot.db config.py
        if [ -f "src/models/trading_filter_model.pkl" ]; then git add src/models/trading_filter_model.pkl; fi
        git diff --quiet && git diff --staged --quiet || (git commit -m "🧠 هوش مصنوعی: فیلترها و مدل با موفقیت آپدیت شدند [Skip CI]" && git push)
