name: Monthly AI Retrain Pipeline

# ۱. اضافه کردن مجوزهای لازم برای نوشتن در مخزن (ضروری برای Push)
permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
    # ۲. ارتقا به نسخه v4 برای پایداری بیشتر
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Machine Learning Training
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python src/train_model.py

    - name: Commit and Push Updated Model Binary
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        
        # بررسی اینکه آیا فایل مدل تغییر کرده یا خیر
        if [ -f "src/models/trading_filter_model.pkl" ]; then
          git add src/models/trading_filter_model.pkl
          # بررسی تغییرات و کامیت کردن
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 آپدیت خودکار لایه هوش مصنوعی ربات (Monthly Retrain)"
          git push
        else
          echo "No model changes found."
        fi
