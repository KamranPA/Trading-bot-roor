name: Monthly AI Retrain Pipeline

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy joblib scikit-learn yfinance psycopg2-binary lightgbm 

      # ── مرحله ۱: دریافت داده‌های به‌روز از یاهو فایننس ──────────────────
      - name: Fetch Latest Market Data
        run: |
          python fetcher.py

      - name: Verify CSV Files Exist
        run: |
          echo "=== فایل‌های CSV موجود ==="
          ls -lh data/4h/ || echo "پوشه data/4h وجود ندارد!"
          CSV_COUNT=$(ls data/4h/*.csv 2>/dev/null | wc -l)
          echo "تعداد فایل CSV: $CSV_COUNT"
          if [ "$CSV_COUNT" -eq "0" ]; then
            echo "هیچ فایل CSV وجود ندارد - pipeline متوقف شد"
            exit 1
          fi

      # ── مرحله ۲: آموزش مدل‌های AI ───────────────────────────────────────
      - name: Train AI Models
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python src/train_model.py --monthly

      - name: Verify Model Files Exist
        run: |
          echo "=== فایل‌های مدل ساخته‌شده ==="
          ls -lh src/models/*.pkl 2>/dev/null || echo "هیچ pkl یافت نشد!"
          PKL_COUNT=$(ls src/models/*.pkl 2>/dev/null | wc -l)
          echo "تعداد مدل: $PKL_COUNT"
          if [ "$PKL_COUNT" -eq "0" ]; then
            echo "هیچ مدلی ساخته نشد - optimizer اجرا نمی‌شود"
            exit 1
          fi

      # ── مرحله ۳: بهینه‌سازی پارامترها با مدل‌های جدید ──────────────────
      # این مرحله best_params.json را با بهترین پارامترهای هر ارز آپدیت می‌کند
      - name: Optimize Parameters (Update best_params.json)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/optimizer.py

      - name: Verify best_params Updated
        run: |
          echo "=== محتوای best_params.json ==="
          cat best_params.json

      # ── مرحله ۴: commit و push همه چیز ──────────────────────────────────
      - name: Commit and Push Models + Params
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

          # مدل‌ها (با -f چون احتمالاً در .gitignore هستند)
          git add -f src/models/*.pkl 2>/dev/null || true
          git add -f src/models/*.pkl 2>/dev/null || true

          # پارامترهای بهینه‌شده
          git add best_params.json

          # نتایج training (اختیاری)
          git add training_results.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "هیچ تغییری برای commit وجود ندارد."
          else
            PKL_COUNT=$(ls src/models/*.pkl 2>/dev/null | wc -l)
            git commit -m "🧠 Monthly Upgrade: ${PKL_COUNT} models retrained + params optimized."
            git push origin HEAD:${{ github.ref_name }}
            echo "Push با موفقیت انجام شد."
          fi

      # ── مرحله ۵: اطلاع‌رسانی تلگرام ────────────────────────────────────
      - name: Send Telegram Notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          PKL_COUNT=$(ls src/models/*.pkl 2>/dev/null | wc -l)
          if [ "$PKL_COUNT" -gt "0" ]; then
            MSG="🧠 <b>ارتقای ماهانه هوش مصنوعی انجام شد!</b>%0A━━━━━━━━━━━━━━━%0A✅ ${PKL_COUNT} مدل اختصاصی بازآموزی شدند.%0A📊 پارامترهای بهینه برای هر ارز آپدیت شد.%0A🚀 <i>ربات یک نسخه باهوش‌تر است.</i>"
          else
            MSG="❌ <b>بازآموزی ماهانه ناموفق بود!</b>%0A━━━━━━━━━━━━━━━%0A⚠️ هیچ مدلی ذخیره نشد. لاگ Actions را بررسی کنید."
          fi
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode=HTML \
            -d text="${MSG}"
