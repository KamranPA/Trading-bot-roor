# -----------------------------------------------------------------
# FILE PATH: /.github/workflows/monthly_brain.yml
# -----------------------------------------------------------------
# سیستم خودکار جراحی معاملات، بهینه‌سازی فیلترهای استراتژی و ارسال گزارش عملکرد ماهانه به تلگرام

name: Monthly AI Self-Correction & Reporting

on:
  schedule:
    - cron: '0 0 1 * *' # اجرای خودکار دقیقاً در ساعت ۰۰:۰۰ اول هر ماه میلادی
  workflow_dispatch: # امکان اجرای دستی در هر زمان با زدن دکمه Run workflow از داخل گیت‌هاب

permissions:
  contents: write # مجوز حیاتی برای ذخیره و Push کردن تغییرات کانفیگ، مدل و دیتابیس روی ریپازیتوری

jobs:
  optimize-and-report:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run AI Engine (Surgical Loss Analysis & Retraining)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # ⚡ اصلاح کلیدی ۱: اجرای مستقیم اسکریپت آموزش مدل ۱۰بعدی پایتون
      run: python src/train_model.py

    - name: Generate & Send Telegram Performance Report
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # فراخوانی متد گزارش‌دهی جدید از طریق مفسر خط فرمان پایتون
        python -c "from src import telegram_bot; telegram_bot.send_performance_report()"

    - name: Commit and Push Strategy, Model & Database Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # ایجاد پوشه مدل در صورتی که برای اولین بار ساخته شده باشد
        mkdir -p src/models
        
        # ⚡ اصلاح کلیدی ۲: اضافه کردن فایل وزن‌های هوش مصنوعی (.pkl) به گیت جهت حفظ حافظه ربات
        git add data/trading_bot.db config.py src/models/trading_filter_model.pkl
        
        # بررسی اینکه آیا هوش مصنوعی تغییری در فیلترها یا مدل اعمال کرده است یا خیر
        git diff --quiet && git diff --staged --quiet || (git commit -m "🧠 هوش مصنوعی: مدل ۱۰‌بعدی بازآموزی، فیلترها بهینه‌سازی و کارنامه ماهانه صادر شد [Skip CI]" && git push)
