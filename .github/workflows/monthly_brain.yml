name: Monthly AI Brain Update

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests ccxt scikit-learn numpy joblib

      - name: Run AI Training
        env:
          PYTHONPATH: ${{ github.workspace }}/src
        run: |
          python -c "from train_model import train_all; train_all()"

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add src/models/
          git commit -m "Auto-update AI model" || echo "No changes to commit"
          git push
