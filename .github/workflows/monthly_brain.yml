name: Monthly AI Retrain Pipeline

permissions:
  contents: write

on:
  schedule:
    # اجرا در روز اول هر ماه در ساعت ۰۰:۰۰
    - cron: '0 0 1 * *'
  workflow_dispatch: 

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn numpy joblib

    - name: Execute Machine Learning Training (Monthly Mode)
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        # اجرای آموزش ترکیبی (بکتست + لایو)
        python src/train_model.py --monthly

    - name: Commit and Push Upgraded Models
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        
        # شناسایی و افزودن مدل‌های جدید
        if ls src/models/*.pkl >/dev/null 2>&1; then
          git add -f src/models/*.pkl
          echo "✅ AI Models detected."
        fi
        
        # کامیت تغییرات
        if git diff --cached --quiet; then
          echo "No changes detected."
        else
          git commit -m "🧠 Monthly Brain Upgrade: AI models learned from live trades."
          git push
        fi

    - name: Send Notification to Telegram
      if: success()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        curl -s -X POST https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage \
        -d chat_id=$TELEGRAM_CHAT_ID \
        -d parse_mode=HTML \
        -d text="🧠 <b>ارتقای هوش مصنوعی انجام شد!</b>%0A━━━━━━━━━━━━━━━%0A✅ مدل‌های اختصاصی ارزها با تکیه بر تجربیات ماه اخیر با موفقیت بازآموزی شدند.%0A🚀 <i>ربات شما حالا یک نسخه باهوش‌تر است.</i>"
