name: Monthly AI Self-Correction

on:
  schedule:
    - cron: '0 0 1 * *' # اجرای خودکار اول هر ماه میلادی
  workflow_dispatch: # دکمه اجرای دستی

permissions:
  contents: write # 👈 بسیار حیاتی: مجوز نوشتن روی ریپازیتوری برای گیت‌هاب اکشنز

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run AI Engine
      run: python -m src.brain # اجرای مغز سیستم و اعمال تغییرات در دیتابیس و کانفیگ

    - name: Commit and Push Strategy Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # 👈 تغییر اصلی: اضافه کردن هر دو فایل دیتابیس و کانفیگ به گیت
        git add data/trading_bot.db config.py
        
        # اگر تغییری وجود داشت، آن را کامیت و روی سرور گیت‌هاب پوش کن
        git diff --quiet && git diff --staged --quiet || (git commit -m "🧠 هوش مصنوعی: فیلترها و استراتژی سیستم بهینه‌سازی شد [Skip CI]" && git push)
