name: 🐛 Debug Main - Test Signal Save

on:
  workflow_dispatch:  # اجرای دستی
  push:
    branches: [ main, master ]
    paths:
      - 'src/database.py'
      - 'src/main.py'
      - 'debug_main.py'

jobs:
  debug-signal-save:
    name: 🧪 Test Signal Save Logic
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    environment: production
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary python-dotenv
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          fi
          pip list
      
      - name: 🔍 Debug - Check files
        run: |
          echo "🔍 بررسی فایل‌های پروژه"
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          ls -la *.py 2>/dev/null || echo "No .py files in root"
          echo "Files in src:"
          ls -la src/*.py 2>/dev/null || echo "No .py files in src"
          
          # بررسی وجود debug_main.py
          if [ -f debug_main.py ]; then
            echo "✅ debug_main.py found"
          else
            echo "⚠️ debug_main.py not found - creating from template"
            cat > debug_main.py << 'EOF'
#!/usr/bin/env python3
import os
import sys
import logging
import random
from datetime import datetime

logging.basicConfig(level=logging.DEBUG)
logger = logging.getLogger(__name__)

sys.path.insert(0, 'src')

try:
    from database import init_db, save_signal_advanced, get_open_positions_count
    logger.info("✅ database module loaded successfully")
except ImportError as e:
    logger.error(f"❌ Error loading database: {e}")
    sys.exit(1)

def simulate_signal_save(pair="BTC-USD"):
    logger.info(f"🔍 Simulating signal save for {pair}")
    
    signal_data = {
        'direction': 'LONG' if random.random() > 0.5 else 'SHORT',
        'entry_price': 30000 + random.randint(-1000, 1000),
        'stop_loss': 29000 + random.randint(-500, 500),
        'tp1': 31000 + random.randint(-500, 500),
        'tp2': 32000 + random.randint(-500, 500),
        'swing_ref': 29500 + random.randint(-200, 200),
        'total_score': 65 + random.randint(0, 30),
        'ai_score': 60 + random.randint(0, 35),
        'rsi_score': 50 + random.randint(0, 40),
        'adx_score': 50 + random.randint(0, 40),
        'ema_score': 50 + random.randint(0, 40),
        'feat_adx': 20 + random.randint(0, 30),
        'feat_rsi': 40 + random.randint(0, 40),
        'feat_rsi_momentum': round(random.uniform(-5, 5), 2),
        'feat_ema_deviation': round(random.uniform(-3, 3), 2),
        'feat_atr_percent': round(random.uniform(0.1, 2.0), 2),
        'feat_trend_line': round(random.uniform(-2, 2), 2),
        'feat_body_ratio': round(random.uniform(0.1, 1.5), 2)
    }
    
    logger.info(f"📊 Signal data: {signal_data}")
    
    try:
        signal_id = save_signal_advanced(pair, **signal_data)
        if signal_id:
            logger.info(f"✅ Signal saved with ID {signal_id}")
            return True
        else:
            logger.error(f"❌ save_signal_advanced returned None")
            return False
    except Exception as e:
        logger.error(f"❌ Error in save_signal_advanced: {e}", exc_info=True)
        return False

def main():
    logger.info("=" * 60)
    logger.info("🚀 Starting Debug Signal Save")
    logger.info("=" * 60)
    
    logger.info("📌 Step 1: Checking database")
    try:
        init_db()
        logger.info("✅ init_db successful")
    except Exception as e:
        logger.error(f"❌ init_db error: {e}")
        return
    
    open_count = get_open_positions_count()
    logger.info(f"📊 Current open positions: {open_count}")
    
    symbols = ['BTC-USD-DEBUG', 'ETH-USD-DEBUG', 'ADA-USD-DEBUG']
    results = {}
    
    logger.info("📌 Step 2: Simulating signal saves")
    for symbol in symbols:
        result = simulate_signal_save(symbol)
        results[symbol] = result
    
    logger.info("=" * 60)
    logger.info("📊 Results:")
    for symbol, result in results.items():
        status = "✅" if result else "❌"
        logger.info(f"{status} {symbol}: {'SUCCESS' if result else 'FAILED'}")
    
    final_count = get_open_positions_count()
    logger.info(f"📊 Final open positions: {final_count}")
    logger.info(f"📈 Change: +{final_count - open_count}")

if __name__ == "__main__":
    main()
EOF
          fi
      
      - name: 🏗️ Check file structure
        run: |
          # اطمینان از وجود فایل database.py در src
          if [ ! -f src/database.py ]; then
            echo "⚠️ src/database.py not found - checking root"
            if [ -f database.py ]; then
              mkdir -p src
              cp database.py src/
              echo "✅ database.py copied to src/"
            fi
          fi
          
          # نمایش محتوای src
          echo "📁 Files in src:"
          ls -la src/
      
      - name: 🐛 Run Debug Main
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🔍 Starting debug main..."
          echo "DATABASE_URL exists: ${DATABASE_URL:+yes}"
          python debug_main.py
      
      - name: 📊 Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-main-logs
          path: |
            debug_main.log
            *.log
          retention-days: 7
      
      - name: 📝 Show summary
        if: always()
        run: |
          echo "📊 Debug Summary:"
          if [ -f debug_main.log ]; then
            cat debug_main.log
          else
            echo "No log file found"
          fi
