name: Analyze DB Losses

on:
  workflow_dispatch: # اجرای دستی از طریق پنل گیت‌هاب

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run Loss Analysis Script
        run: |
          python analyze_losses.py
