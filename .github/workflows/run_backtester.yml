name: Run Backtester and Optimizer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies for LightGBM
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt numpy joblib yfinance lightgbm psycopg2-binary

      # ۱. دریافت داده‌ها (افزودن DATABASE_URL)
      - name: Fetch Market Historical Data
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python fetcher.py

      # ۲. اجرای بک‌تستر
      - name: Run Backtest
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python src/backtester.py

      # ۳. بهینه‌سازی پارامترها
      - name: Run Optimizer
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python src/optimizer.py

      # ۴. آموزش مدل
      - name: Train AI Model
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python src/train_model.py

      # ۵. کامیت و پوش هوشمند (اصلاح برای جلوگیری از اضافه کردن دیتابیس محلی)
      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # 🛠️ اصلاح: به جای git add . (که دیتابیس محلی را هم برمی‌دارد)،
          # فقط فایل‌های مدل و خروجی‌های غیر از دیتابیس را استیج می‌کنیم.
          git add best_params.json models/ 2>/dev/null || echo "No tracked files to add."
          
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Auto-update: Saving AI models and params"
            echo "🔄 Pulling latest changes from remote..."
            git pull origin main --rebase
            git push origin main
          fi
