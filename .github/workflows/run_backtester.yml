Name: Run Backtester and Optimizer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt numpy joblib yfinance lightgbm psycopg2-binary

      # === گام حیاتی: نصب و راه‌اندازی تونل کلودفلر قبل از اجرای خط لوله ===
      - name: Setup and Start Cloudflared Tunnel
        env:
          CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
        run: |
          echo "📥 دانلود و نصب کلودفلرد..."
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          
          echo "🚀 اجرای تونل کلودفلر در پس‌زمینه..."
          sudo cloudflared service install "$CLOUDFLARE_TUNNEL_TOKEN" || true
          sudo systemctl start cloudflared || cloudflared tunnel run --token "$CLOUDFLARE_TUNNEL_TOKEN" &
          
          # استراحت کوتاه برای اطمینان از برقراری کامل اتصال تونل
          sleep 5

      - name: Execute Pipeline and Force Commit Results
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # 0. پاکسازی فایل‌های قدیمی برای اطمینان از تازگی محاسبات
          rm -f trading_bot_backtest.db
          rm -f src/trading_bot_backtest.db
          rm -f backtest_table_summary.csv
          
          # دریافت آخرین تغییرات مخزن
          git pull origin ${{ github.ref_name }}
          
          # ۱. دریافت داده‌ها
          python fetcher.py
          
          # ۲. اجرای بک‌تستر
          python src/backtester.py
          
          # ۳. بهینه‌سازی پارامترها
          python src/optimizer.py
          
          # ۴. آموزش مدل
          python src/train_model.py
          
          # ۵. تنظیمات گیت برای ثبت تغییرات
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # ۶. اطمینان از وجود فایل‌های خروجی
          ls -l backtest_table_summary.csv || echo "Warning: CSV not found"
          ls -l best_params.json || echo "Warning: JSON not found"
          
          # ۷. افزودن تغییرات به گیت
          git add .
          
          # ثبت تغییرات با زمان فعلی
          git commit -m "Auto-update: Syncing backtest results $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          
          # ۸. ارسال به ریپازیتوری
          git push origin HEAD:${{ github.ref_name }} --force

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            backtest_table_summary.csv
            best_params.json
