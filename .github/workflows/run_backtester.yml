name: Run Backtester and Optimizer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt numpy joblib yfinance lightgbm psycopg2-binary

      # تمام مراحل در یک بلاک واحد اجرا می‌شوند تا فایل‌ها در کانتینر باقی بمانند
      - name: Execute Pipeline and Force Commit Results
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # ۱. دریافت داده‌ها
          python fetcher.py
          
          # ۲. اجرای بک‌تستر
          python src/backtester.py
          
          # ۳. بهینه‌سازی پارامترها
          python src/optimizer.py
          
          # ۴. آموزش مدل
          python src/train_model.py
          
          # ۵. تنظیمات گیت
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # ۶. اطمینان از وجود فایل‌ها (لیست کردن برای مشاهده در لاگ)
          ls -l backtest_table_summary.csv
          ls -l best_params.json
          
          # ۷. کامیت اجباری (Force Commit) برای عبور از مشکل "No changes detected"
          git add -f backtest_table_summary.csv best_params.json trading_bot_backtest.db models/ data/4h/*.csv 2>/dev/null || echo "Some files not found."
          
          # ثبت تغییرات با زمان فعلی (برای ایجاد محتوای متفاوت در هر اجرا)
          git commit -m "Auto-update: Syncing backtest results $(date +'%Y-%m-%d %H:%M:%S')"
          
          # ۸. ارسال به ریپازیتوری با زور (Force Push)
          git push origin HEAD:${{ github.ref_name }} --force

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            backtest_table_summary.csv
            best_params.json
