name: Run Trading System

on:
  workflow_dispatch:

jobs:
  run-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - name: Install
        run: pip install pandas numpy matplotlib ccxt
      
      # گام ۱: دریافت دیتای جدید
      - name: Fetch Data
        run: python fetcher.py
        
      # گام ۲: پیدا کردن بهترین استراتژی توسط دستیار
      - name: Optimize Strategy
        run: python optimizer.py
        
      # گام ۳: اجرای بک‌تستر با تنظیمات بهینه
      - name: Run Backtester
        run: python backtester.py
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            backtest_result.png
            best_params.json
