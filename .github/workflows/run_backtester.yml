name: Run Backtester and Optimizer

on:
  workflow_dispatch: 

# اضافه کردن دسترسی write برای اینکه ربات بتواند فایل‌های جدید را در مخزن ذخیره کند
permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # هماهنگی با ربات اصلی

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests ccxt scikit-learn numpy joblib

      # ۱. ابتدا دانلود داده‌های تاریخی بازار تا فایل‌های CSV ساخته شوند
      - name: Fetch Market Historical Data
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python fetcher.py

      # ۲. اجرای بک‌تستر (داده‌های شبیه‌سازی در دیتابیس ذخیره می‌شوند)
      - name: Run Backtest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/backtester.py

      # ۳. اجرای بهینه‌ساز پارامترها
      - name: Run Optimizer
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/optimizer.py

      # ۴. اجرای آموزش هوش مصنوعی (یادگیری از دیتابیس بکتست و بروزرسانی مدل)
      - name: Train AI Model
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/train_model.py

      # ۵. کامیت و پوش کردن تغییرات به مخزن (کاملاً ایمن و داینامیک)
      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # بررسی وجود فایل دیتابیس اصلی/بکتست و افزودن آن
          if [ -f "data/trading_bot.db" ]; then 
            git add data/trading_bot.db
          fi
          
          # استفاده از فلگ -f برای اجبار گیت به نادیده گرفتن محدودیت .gitignore برای فایل pkl
          if [ -f "src/models/trading_filter_model.pkl" ]; then 
            git add -f src/models/trading_filter_model.pkl
          fi
          
          if [ -f "best_params.json" ]; then 
            git add best_params.json
          fi
          
          # بررسی وضعیت تغییرات و اعمال کامیت
          if git diff --cached --quiet; then
            echo "No changes detected or files not generated yet, skipping commit."
          else
            git commit -m "Auto-update: Backtest DB, AI Model, and optimized parameters"
            git push
          fi
