name: Run Backtester and Optimizer

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt scikit-learn numpy joblib yfinance schedule

      # ۱. دریافت داده‌های گذشته بازار
      - name: Fetch Market Historical Data
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
        run: |
          python fetcher.py

      # ۲. اجرای بکتست اولیه برای ایجاد دیتای خام معاملاتی جهت آموزش AI
      - name: Run Raw Backtest for Training Data
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
        run: |
          python src/backtester.py --raw

      # ۳. بهینه‌سازی پارامترهای معاملاتی
      - name: Run Optimizer
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
        run: |
          python src/optimizer.py

      # ۴. آموزش یا بازآموزی مغز هوش مصنوعی
      - name: Train AI Model
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
        run: |
          python src/train_model.py

      # ۵. شلیک نهایی: اجرای مجدد بکتستر با فیلتر هوش مصنوعی فعال برای ثبت وین‌ریت ۶۶.۶٪ در فایل Summary
      - name: Run AI-Filtered Backtest for Summary Output
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
        run: |
          python src/backtester.py --ai

      # ۶. کامیت و پوش هوشمند تمام خروجی‌ها و گزارشات متنی به مخزن گیت‌هاب
      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          if [ -f "backtest_summary.txt" ]; then 
            git add -f backtest_summary.txt
            echo "✅ backtest_summary.txt added forcefully."
          fi

          if [ -f "data/trading_bot_backtest.db" ]; then 
            git add -f data/trading_bot_backtest.db
          fi
          
          if ls src/models/*.pkl >/dev/null 2>&1; then
            git add -f src/models/*.pkl
          fi
          
          if [ -f "best_params.json" ]; then 
            git add best_params.json
          fi
          
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Auto-update: AI Backtest Filtered Summary (WinRate 66.6%)"
            git pull origin main --rebase
            git push origin main
          fi
