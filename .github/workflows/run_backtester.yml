name: Run Backtester and Optimizer

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    # این دستور باعث می‌شود هر اسکریپتی که اجرا می‌شود، پوشه روت را در مسیر پایتون داشته باشد
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests ccxt scikit-learn numpy joblib yfinance schedule

      - name: Run Pipeline
        run: |
          python fetcher.py
          python src/backtester.py --raw
          python src/optimizer.py
          python src/train_model.py
          python src/backtester.py --ai

      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # افزودن فایل‌های خروجی
          git add -f backtest_summary.txt data/trading_bot_backtest.db src/models/*.pkl best_params.json || true
          
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: AI Backtest Results"
            git pull origin main --rebase
            git push origin main
          fi
