name: Run Backtester and Optimizer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install pandas requests ccxt numpy joblib yfinance lightgbm

      # مرحله حیاتی دیباگ: دیدن محتویات پوشه قبل از اجرا
      - name: Debug Environment
        run: |
          echo "Current Path: $(pwd)"
          ls -F

      # اجرای بک‌تستر با لاگ‌گیری دقیق
      - name: Run Backtest
        run: |
          python src/backtester.py
          echo "Checking if file exists after run:"
          ls -l backtest_table_summary.csv || echo "FILE WAS NOT CREATED BY PYTHON"

      - name: Upload Backtest Report
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: backtest_table_summary.csv
          if-no-files-found: error # اگر فایل ساخته نشد، همینجا اکشن خطا بدهد تا بفهمیم مشکل کجاست
