name: Run Backtester and Optimizer
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt numpy joblib yfinance lightgbm psycopg2-binary SQLAlchemy

      - name: Fetch Market Data
        run: |
          python fetcher.py
          echo "✅ fetcher.py تمام شد"

      - name: Verify CSV Files
        run: |
          python -c "
          import os, sys
          data_dir = 'data/4h'
          watchlist = [
              'BTCUSDT','ETHUSDT','SOLUSDT','DOTUSDT','LINKUSDT',
              'AVAXUSDT','XRPUSDT','LTCUSDT','BCHUSDT','ATOMUSDT',
          ]
          missing = []
          for sym in watchlist:
              path = os.path.join(data_dir, f'{sym}_history.csv')
              if not os.path.exists(path):
                  missing.append(path)
                  print(f'❌ فایل یافت نشد: {path}')
              else:
                  import pandas as pd
                  df = pd.read_csv(path)
                  print(f'✅ {sym}: {len(df)} ردیف | ستون‌ها: {list(df.columns)}')
          if missing:
              print(f'تعداد فایل‌های گمشده: {len(missing)}')
              sys.exit(1)
          print('✅ همه فایل‌های CSV آماده هستند')
          "

      - name: Execute Pipeline and Force Commit Results
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          rm -f data/backtest_trades.csv

          echo "▶️ شروع backtester..."
          python src/backtester.py
          echo "✅ backtester تمام شد"

          echo "▶️ شروع train_model..."
          python src/train_model.py
          echo "✅ train_model تمام شد"

          echo "▶️ شروع optimizer..."
          python src/optimizer.py
          echo "✅ optimizer تمام شد"

          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add -f backtest_table_summary.csv || true
          git add -f best_params.json           || true
          git add -f data/trading_bot_backtest.db || true
          git add -f training_results.json      || true
          git add -f src/models/                || true
          git add .
          git commit -m "Auto-update: Backtest + Train + Optimize $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }} --force

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            backtest_table_summary.csv
            best_params.json
            training_results.json
            data/trading_bot_backtest.db
