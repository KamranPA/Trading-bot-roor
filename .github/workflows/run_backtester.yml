name: Run Backtester and Optimizer

on:
  workflow_dispatch: 

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests ccxt scikit-learn numpy joblib

      # ۱. اجرای بک‌تستر (تولید گزارش و بروزرسانی نتایج در دیتابیس)
      - name: Run Backtest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/backtester.py

      # ۲. اجرای بهینه‌ساز (تغییر پارامترها بر اساس عملکرد)
      - name: Run Optimizer
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/optimizer.py

      # ۳. ذخیره نتایج بک‌تست و پارامترهای جدید در مخزن
      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # اضافه کردن فایل گزارش و فایل پارامترهای هوشمند
          git add backtest_summary.txt best_params.json
          
          # کامیت کردن اگر تغییری وجود داشت
          git commit -m "Auto-update: Backtest results and optimized parameters" || echo "No changes to commit"
          git push
