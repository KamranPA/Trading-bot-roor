name: Run Backtester and Optimizer

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt scikit-learn numpy joblib yfinance

      - name: Fetch Market Historical Data
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python fetcher.py

      - name: Run Backtest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/backtester.py

      - name: Run Optimizer
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/optimizer.py

      - name: Train AI Model
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/train_model.py

      - name: Generate Summary Report
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "
          import sqlite3, config, os
          
          db_path = config.DB_PATH_BACKTEST
          if not os.path.exists(db_path):
              print('⚠️ دیتابیس بکتست یافت نشد!')
              exit(0)
              
          conn = sqlite3.connect(db_path)
          cursor = conn.cursor()
          lines = ['📈 گزارش بکتست Breakout', '================================']
          total = 0
          
          for symbol in config.WATCHLIST:
              cursor.execute('SELECT COUNT(*), AVG(pnl_percent > 0) * 100 FROM signals WHERE symbol = ?', (symbol,))
              row = cursor.fetchone()
              if row and row[0] > 0:
                  lines.append(f'{symbol} | نرخ برد: {row[1]:.1f} | تعداد معاملات: {row[0]}')
                  total += row[0]
                  
          lines.append('================================')
          lines.append(f'📊 مجموع معاملات: {total}')
          conn.close()
          
          with open('backtest_summary.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(lines))
          print('✅ فایل گزارش با موفقیت ساخته شد.')
          "

      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # افزودن دیتابیس بکتست
          if [ -f "data/trading_bot_backtest.db" ]; then 
            git add -f data/trading_bot_backtest.db
          fi
          
          # افزودن مدل‌های هوش مصنوعی (در صورت وجود)
          if ls src/models/*.pkl >/dev/null 2>&1; then
            git add -f src/models/*.pkl
          fi
          
          # افزودن فایل تنظیمات بهینه شده
          if [ -f "best_params.json" ]; then 
            git add best_params.json
          fi
          
          # افزودن فایل گزارش متنی جدید
          if [ -f "backtest_summary.txt" ]; then 
            git add backtest_summary.txt
          fi
          
          # کامیت و پوش با مدیریت تداخل‌ها
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Auto-update: Backtest DB, Models, and Summary Report"
            echo "🔄 Pulling latest changes from remote to avoid conflict..."
            git pull origin main --rebase
            git push origin main
          fi
