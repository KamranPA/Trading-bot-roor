name: Full Backtest Pipeline
on: workflow_dispatch

jobs:
  run-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: pip install pandas ccxt matplotlib
        
      - name: Fetch Data
        run: |
          python fetcher.py
          echo "لیست فایل‌های موجود:"
          ls -R data/historical/
          
      - name: Optimize
        run: python optimizer.py
        
      - name: Run Backtester
        run: python backtester.py
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-results
          path: |
            *.png
            *.json
            data/historical/*.csv
