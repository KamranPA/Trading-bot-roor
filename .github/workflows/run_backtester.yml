name: Full Backtest Pipeline
on:
  workflow_dispatch:

jobs:
  run-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pandas ccxt matplotlib
      
      - name: Fetch Data
        run: |
          python fetcher.py
          sleep 10  # تأخیر برای اطمینان از ذخیره شدن فایل‌ها
      
      - name: Optimize
        run: python optimizer.py
        
      - name: Backtest
        run: python backtester.py
        
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            *.png
            *.json
            data/historical/*.csv
