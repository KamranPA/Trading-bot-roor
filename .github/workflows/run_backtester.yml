name: Full Backtest Pipeline
on:
  workflow_dispatch:

jobs:
  run-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pandas ccxt matplotlib
      
      - name: Fetch Data
        run: |
          mkdir -p data/historical
          python fetcher.py
          ls -l data/historical  # این دستور به ما نشان می‌دهد آیا فایلی ساخته شده یا نه
        
      - name: Optimize
        run: python optimizer.py
        
      - name: Backtest
        run: python backtester.py
        
      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-results
          path: |
            *.png
            *.json
            data/historical/
