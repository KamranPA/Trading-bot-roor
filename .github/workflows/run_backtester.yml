name: Full Backtest Pipeline
on: workflow_dispatch

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install pandas ccxt matplotlib

      - name: Fetch and Run
        run: |
          # اجرای اسکریپت‌ها به ترتیب
          python fetcher.py
          python optimizer.py
          python backtester.py
        
      - name: Upload Artifacts
        if: always() # حتی اگر خطایی رخ داد، فایل‌ها آپلود شوند
        uses: actions/upload-artifact@v4
        with:
          name: final-results
          path: |
            *.png
            *.json
            data/historical/*.csv
