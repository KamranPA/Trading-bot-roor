name: Full Backtest Pipeline

on:
  workflow_dispatch:

jobs:
  run-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas ccxt matplotlib

      - name: 1. Fetch Data
        run: |
          mkdir -p data/historical
          python fetcher.py
        
      - name: 2. Optimize Strategy
        run: python optimizer.py
        
      - name: 3. Run Backtester
        run: python backtester.py
        
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-artifacts
          path: |
            backtest_result.png
            best_params.json
            data/historical/*.csv
