name: Run Backtester and Optimizer

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # دریافت کل تاریخچه برای حل مشکلات Merge

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt scikit-learn numpy joblib yfinance schedule

      # ۱. ابتدا دانلود داده‌های عمیق بازار با اسکریپت yfinance
      - name: Fetch Market Historical Data
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python fetcher.py

      # ۲. اجرای بکتستر اولیه (دیتای خام) برای ایجاد دیتای آموزش هوش مصنوعی
      - name: Run Raw Backtest for Training Data
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/backtester.py

      # ۳. اجرای بهینه‌ساز پارامترها بر اساس دیتای خام
      - name: Run Optimizer
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/optimizer.py

      # ۴. اجرای آموزش هوش مصنوعی با حد نصاب لازم
      - name: Train AI Model
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/train_model.py

      # ۵. شلیک نهایی: اجرای مجدد بکتستر (اینبار با فیلتر هوش مصنوعی فعال) برای فایل Summary
      - name: Run AI-Filtered Backtest for Summary Output
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/backtester.py

      # ۶. کامیت و پوش هوشمند با استراتژی رفع تداخل (Pull Rebase)
      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # افزودن دیتابیس بکتست
          if [ -f "data/trading_bot_backtest.db" ]; then 
            git add -f data/trading_bot_backtest.db
          fi

          # افزودن فایل متنی گزارش نهایی
          if [ -f "backtest_summary.txt" ]; then 
            git add -f backtest_summary.txt
          fi
          
          # افزودن مدل‌های هوش مصنوعی (در صورت وجود)
          if ls src/models/*.pkl >/dev/null 2>&1; then
            git add -f src/models/*.pkl
            echo "✅ AI Models detected and added."
          else
            echo "⚠️ No AI models (.pkl) generated yet."
          fi
          
          # افزودن فایل تنظیمات بهینه شده
          if [ -f "best_params.json" ]; then 
            git add best_params.json
          fi
          
          # بررسی اینکه آیا اصلاً تغییری برای کامیت وجود دارد یا خیر
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Auto-update: Dual-Pass Backtest, AI Models, and real Summary results"
            
            # گرفتن تغییرات جدید لایو از سرور قبل از Push
            echo "🔄 Pulling latest changes from remote to avoid conflict..."
            git pull origin main --rebase
            
            # ارسال نهایی بدون خطا
            git push origin main
          fi
