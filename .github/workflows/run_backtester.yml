name: Fetch and Run Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install pandas

      # گام اول: اجرای بهینه‌ساز (تولیدِ فایلِ پارامترها)
      - name: Run Optimizer
        run: python optimizer.py

      # گام دوم: اجرای بک‌تستر (فقط در صورتی که Optimizer موفق بود)
      - name: Run Backtester
        run: python backtester.py
        
      # گام سوم: آپلود نتایج (برای اینکه فایل summary را ببینید)
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: summary.txt
