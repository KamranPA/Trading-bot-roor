name: Run Backtester and Optimize

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot-and-backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests ccxt numpy joblib yfinance lightgbm

      - name: Run Bot
        run: python main.py

      - name: Run Backtester and Optimizer
        run: python src/backtester.py

      - name: Upload Backtest Report
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: backtest_table_summary.csv
          if-no-files-found: warn
