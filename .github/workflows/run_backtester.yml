name: Run Backtester and Optimizer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt numpy joblib yfinance lightgbm psycopg2-binary

      - name: Fetch Market Historical Data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python fetcher.py

      - name: Run Backtest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python src/backtester.py

      - name: Run Optimizer
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python src/optimizer.py

      - name: Train AI Model
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python src/train_model.py

      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # کپی فایل‌ها به ریشه برای اطمینان از شناسایی توسط git
          cp backtest_table_summary.csv ./backtest_table_summary.csv 2>/dev/null || echo "CSV not found"
          cp best_params.json ./best_params.json 2>/dev/null || echo "JSON not found"
          
          git add -f best_params.json backtest_table_summary.csv trading_bot_backtest.db models/ data/4h/*.csv 2>/dev/null || echo "No files to add."
          
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update: Syncing backtest results and models"
            git push origin HEAD:${{ github.ref_name }} --force
          else
            echo "No changes detected."
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            backtest_table_summary.csv
            best_params.json
