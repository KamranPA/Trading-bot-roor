name: Run Backtester and Optimizer

on:
  workflow_dispatch: # امکان اجرای دستی از تب Actions گیت‌هاب

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0 # دریافت کل تاریخچه برای حل مشکلات Merge

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies for LightGBM
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt numpy joblib yfinance lightgbm

      - name: Fetch Market Historical Data
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python fetcher.py

      - name: Run Backtest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/backtester.py

      - name: Run Optimizer
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/optimizer.py

      - name: Train AI Model
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/train_model.py

      # ۵. کامیت و پوش هوشمند با استراتژی رفع تداخل
      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # استیج کردن فایل‌ها
          if [ -f "data/crypto_backtest.db" ]; then git add -f data/crypto_backtest.db; fi
          if [ -f "backtest_table_summary.csv" ]; then git add backtest_table_summary.csv; fi
          if ls src/models/*.pkl >/dev/null 2>&1; then git add -f src/models/*.pkl; fi
          if [ -f "best_params.json" ]; then git add best_params.json; fi
          
          # 🔥 اصلاح اصلی: بررسی تغییرات و کامیت کردن پیش از Pull
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Auto-update: Forced Multi-Models, Deep Backtest DB & Table Summary"
            
            # اکنون که تغییرات کامیت شده‌اند، Pull بدون خطا انجام می‌شود
            echo "🔄 Pulling latest changes from remote..."
            git pull origin main --rebase
            
            # ارسال نهایی
            git push origin main
          fi
