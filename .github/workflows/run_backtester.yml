name: Run Backtester and Optimizer
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt numpy joblib yfinance lightgbm psycopg2-binary SQLAlchemy

      - name: Fetch Market Data
        run: |
          echo "📂 working directory: $(pwd)"
          python fetcher.py

      - name: Verify CSV Files
        run: |
          python -c "
          import os, sys, glob
          data_dir = os.path.join(os.getcwd(), 'data', '4h')
          print(f'بررسی پوشه: {data_dir}')
          all_csv = glob.glob(os.path.join(data_dir, '*.csv'))
          print(f'فایل‌های CSV: {[os.path.basename(f) for f in all_csv]}')
          watchlist = [
              'BTCUSDT','ETHUSDT','SOLUSDT','DOTUSDT','LINKUSDT',
              'AVAXUSDT','XRPUSDT','LTCUSDT','BCHUSDT','ATOMUSDT',
          ]
          missing = []
          for sym in watchlist:
              path = os.path.join(data_dir, f'{sym}_history.csv')
              if not os.path.exists(path):
                  missing.append(sym)
                  print(f'❌ {sym}: {path}')
              else:
                  import pandas as pd
                  df = pd.read_csv(path)
                  print(f'✅ {sym}: {len(df)} ردیف')
          if missing:
              print(f'ناموفق: {missing}')
              sys.exit(1)
          print('✅ همه فایل‌ها آماده‌اند')
          "

      - name: Execute Pipeline and Force Commit Results
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          rm -f data/backtest_trades.csv

          # ترتیب: optimizer → train_model → backtester
          #   1) optimizer بهترین TP_RATIO/SL_RATIO/... را پیدا می‌کند → best_params.json
          #      (mode پیش‌فرض "backtest" است → grid کامل، شامل SL_RATIO)
          #   2) train_model با همان TP_RATIO/SL_RATIO هر ارز، target را می‌سازد
          #      و AI_THRESHOLD کالیبره‌شده را تولید می‌کند → ai_thresholds.json
          #   3) backtester با هر دو فایل تازه، نتیجه‌ی نهایی واقعی را گزارش می‌دهد

          echo "▶️ optimizer (مرحله ۱: بهینه‌سازی پارامترهای استراتژی)..."
          python src/optimizer.py
          echo "✅ optimizer تمام شد"

          echo "=== best_params.json ==="
          cat best_params.json || echo "فایل وجود ندارد!"

          echo "▶️ train_model (مرحله ۲: آموزش مدل + کالیبراسیون AI_THRESHOLD)..."
          python src/train_model.py
          echo "✅ train_model تمام شد"

          echo "=== ai_thresholds.json (per-symbol calibration) ==="
          cat ai_thresholds.json || echo "فایل ai_thresholds.json ساخته نشد!"

          echo "▶️ backtester (مرحله ۳: گزارش نهایی با پارامترهای تازه)..."
          python src/backtester.py
          echo "✅ backtester تمام شد"

          echo "=== backtest_table_summary.csv ==="
          cat backtest_table_summary.csv || echo "فایل وجود ندارد!"

          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add -f backtest_table_summary.csv  || true
          git add -f best_params.json            || true
          git add -f data/trading_bot_backtest.db || true
          git add -f training_results.json       || true
          git add -f ai_thresholds.json          || true
          git add -f src/models/                 || true
          git add .
          git status
          git commit -m "Auto-update: Backtest + Train + Optimize $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          # ✅ FIX: force-with-lease به‌جای force — اگر بین checkout و push
          # (مثلاً توسط trade.yml که هر ۳۰ دقیقه اجرا می‌شود) commit دیگری
          # روی همین برنچ اضافه شده باشد، force-with-lease از rewrite بی‌صدای
          # آن جلوگیری می‌کند و job را با خطا متوقف می‌کند (به‌جای حذف بی‌صدا).
          git push origin HEAD:${{ github.ref_name }} --force-with-lease

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            backtest_table_summary.csv
            best_params.json
            training_results.json
            data/trading_bot_backtest.db
            ai_thresholds.json
