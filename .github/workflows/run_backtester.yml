name: Run Backtester and Optimizer
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt numpy joblib yfinance lightgbm psycopg2-binary SQLAlchemy

      - name: Execute Pipeline and Force Commit Results
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # ۱. دریافت داده‌ها
          python fetcher.py

          # ۲. اجرای بک‌تستر
          python src/backtester.py

          # ۳. آموزش مدل با داده‌های جدید
          python src/train_model.py

          # ۴. بهینه‌سازی پارامترها با مدل جدید
          python src/optimizer.py

          # ۵. تنظیمات گیت
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'

          # ۶. اضافه کردن اجباری فایل‌های خروجی
          git add -f backtest_table_summary.csv
          git add -f best_params.json
          git add -f data/trading_bot_backtest.db
          git add .

          # ۷. ثبت تغییرات
          git commit -m "Auto-update: Backtest + Train + Optimize $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"

          # ۸. ارسال به ریپازیتوری
          git push origin HEAD:${{ github.ref_name }} --force

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            backtest_table_summary.csv
            best_params.json
            data/trading_bot_backtest.db
