name: Run Backtester and Optimizer

on:
  workflow_dispatch: 

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests ccxt scikit-learn numpy joblib

      # ۱. اجرای بک‌تستر
      - name: Run Backtest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/backtester.py

      # ۲. اجرای بهینه‌ساز
      - name: Run Optimizer
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python src/optimizer.py

      # ۳. ذخیره نتایج با مدیریت خطا برای فایل‌های تولید شده
      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # افزودنِ فایل گزارش که همیشه تولید می‌شود
          git add backtest_summary.txt
          
          # افزودنِ فایل پارامترها فقط در صورتی که تولید شده باشد
          if [ -f "best_params.json" ]; then
            git add best_params.json
          fi
          
          # کامیت کردن فقط در صورت وجود تغییرات
          git commit -m "Auto-update: Backtest summary and optimized params" || echo "No changes to commit"
          git push
