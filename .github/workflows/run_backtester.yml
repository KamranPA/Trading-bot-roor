name: Run Backtester and Optimizer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies for LightGBM
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt numpy joblib yfinance lightgbm psycopg2-binary

      # ۱. دریافت داده‌ها
      - name: Fetch Market Historical Data
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python fetcher.py

      # ۲. اجرای بک‌تستر
      - name: Run Backtest
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python src/backtester.py

      # ۳. بهینه‌سازی پارامترها
      - name: Run Optimizer
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python src/optimizer.py

      # ۴. آموزش مدل
      - name: Train AI Model
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python src/train_model.py

      # ۵. کامیت و پوش هوشمند (اصلاح‌شده برای رفع خطای ریبیس و ذخیره تمامی خروجی‌ها)
      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # پاکسازی تغییرات ناخواسته برای جلوگیری از خطای unstaged changes
          git reset --hard
          
          # اضافه کردن فایل‌های مدل، تنظیمات و خروجی‌های بکتست
          git add best_params.json models/ trading_bot_backtest.db backtest_table_summary.csv data/4h/*.csv 2>/dev/null || echo "No files to add."
          
          # بررسی وضعیت تغییرات
          if git diff --cached --quiet; then
            echo "No changes detected, skipping commit."
          else
            git commit -m "Auto-update: Saving AI models, backtest logs, and params"
            # استفاده از push --force برای جلوگیری از تداخل در محیط CI/CD
            git push origin main --force
          fi
