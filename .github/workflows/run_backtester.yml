name: trade

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-bot-and-backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas requests ccxt numpy joblib yfinance lightgbm
      
      - name: Run Bot
        run: python main.py
        
      - name: Run Backtester and Optimizer
        run: python src/backtester.py
        
      - name: Upload Backtest Report
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: backtest_table_summary.csv
