name: Full Backtest Pipeline
on: workflow_dispatch

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pandas ccxt
      
      - name: Fetch and Run
        run: |
          python fetcher.py
          python optimizer.py
          python backtester.py
        
      # این بخش حیاتی است: فایل‌ها را از حافظه موقت برمی‌دارد و به Artifact تبدیل می‌کند
      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: my-backtest-files
          path: |
            data/historical/
            best_params.json
