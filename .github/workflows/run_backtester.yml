name: Run Backtester and Optimizer

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pandas requests ccxt numpy joblib yfinance lightgbm psycopg2-binary SQLAlchemy

      - name: Execute Pipeline and Force Commit Results
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # ۱. دریافت داده‌ها
          python fetcher.py
          
          # ۲. اجرای بک‌تستر
          python src/backtester.py
          
          # ۳. بهینه‌سازی پارامترها
          python src/optimizer.py
          
          # ۴. آموزش مدل
          python src/train_model.py
          
          # ۵. تنظیمات گیت
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # ۶. اطمینان از وجود فایل‌ها
          ls -l backtest_table_summary.csv || echo "Warning: CSV not found"
          ls -l best_params.json || echo "Warning: JSON not found"
          
          # ۷. اضافه کردن اجباری فایل‌ها و کامیت (حتی اگر در gitignore باشند)
          git add -f backtest_table_summary.csv
          git add -f best_params.json
          git add .
          
          # ثبت تغییرات با زمان فعلی (استفاده از || برای جلوگیری از خطا در صورت نبود تغییر جدید)
          git commit -m "Auto-update: Syncing backtest results $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          
          # ۸. ارسال به ریپازیتوری با زور
          git push origin HEAD:${{ github.ref_name }} --force

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            backtest_table_summary.csv
            best_params.json
