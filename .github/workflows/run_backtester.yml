name: Run Backtester Report

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        # در اینجا مستقیماً مسیر فایل را مشخص می‌کنیم تا شک و شبهه‌ای باقی نماند
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib
          
      - name: Run Backtester
        # این دستور باعث می‌شود پایتون پوشه فعلی را به عنوان ریشه بشناسد
        run: export PYTHONPATH=$PYTHONPATH:. && python backtester.py
