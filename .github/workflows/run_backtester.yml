name: Full Backtest Pipeline
on: workflow_dispatch

jobs:
  run-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install pandas ccxt matplotlib
      
      - name: Fetch Data
        run: python fetcher.py
        
      - name: Optimize
        run: python optimizer.py
        
      - name: Backtest
        run: python backtester.py
        
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            backtest_result.png
            best_params.json
