name: Run Backtester

on:
  workflow_dispatch: # برای اجرای دستی در تب Actions

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # نصب کتابخانه‌های مورد نیاز
          pip install pandas numpy matplotlib ccxt
          
      - name: Run Backtester
        # اضافه کردن مسیر جاری به PYTHONPATH برای شناسایی پوشه src
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          python backtester.py
        
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: backtest-report
          path: backtest_result.png # این فایل خروجی تصویر نمودار شماست
