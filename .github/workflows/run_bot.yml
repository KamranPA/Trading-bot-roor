name: Core Trading Bot Pipeline

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # مرحله ۱: بازیابی دیتابیس از اجرای قبلی (اگر وجود داشته باشد)
      - name: Restore Previous Session State
        uses: dawidd6/action-download-artifact@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          name: bot-runtime-state
          path: .
          continue-on-error: true

      # مرحله ۲: اجرای ربات
      - name: Run Trading Bot Logic
        env:
          PYTHONPATH: ${{ github.workspace }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py

      # مرحله ۳: آپلود و ذخیره دیتابیس (حتی اگر ربات خطا داد)
      - name: Upload and Preserve Updated State
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-runtime-state
          path: |
            data/
            best_params.json
            src/models/
          retention-days: 7
