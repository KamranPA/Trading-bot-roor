# ---------------------------------------------------------
# FILE PATH: .github/workflows/main.yml
# ---------------------------------------------------------
name: Trading Bot Engine

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas requests pandas-ta scikit-learn joblib

      - name: Run Trading Engine
        run: python main.py

      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # اضافه کردن فایل‌هایی که باید بروزرسانی شوند
          git add backtest_summary.txt best_params.json data/trading_bot.db
          
          # بررسی تغییرات و پوش کردن آن‌ها
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Bot results and database" && git push)
