name: Automated Crypto Trading Bot

on:
  workflow_dispatch: # بیدار شدن سیستم فقط با دستور دستی یا کرون‌جاب بیرونی (بدون زمان‌بندی داخلی)

jobs:
  trade_scanner:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Trading Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    # ذخیره خودکار تغییرات دیتابیس در پوشه data پس از پایان اسکن
    - name: Commit and Push Database Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add data/trading_bot.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 ربات: دیتابیس و لاگ اسکن‌ها در پوشه data بروزرسانی شد" && git push)
