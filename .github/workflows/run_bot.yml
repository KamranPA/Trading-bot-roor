name: Run Trading Bot

on:
  schedule:
    - cron: '*/30 * * * *' # اجرای خودکار ربات هر ۳۰ دقیقه
  workflow_dispatch: # امکان اجرای دستی

permissions:
  contents: write # مجوز رسمی برای ذخیره کردن و Push دیتابیس و مدل‌ها

jobs:
  run-bot-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }} # اصلاح شد (انتقال به همان خط)

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Trading Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Auto-Commit & Push Database & AI Models
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        if [ -f data/trading_bot.db ]; then
          git add data/trading_bot.db
        fi
        
        if [ -d src/models ]; then
          git add src/models/* || echo "هنوز مدلی ساخته نشده است"
        fi
        
        git diff --quiet && git diff --staged --quiet || (git commit -m "🗄️ سیستم: بروزرسانی لایو دیتابیس و فایل مدل هوش مصنوعی [Skip CI]" && git push)
