name: Run Trading Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # 🚀 کش کردنِ پکیج‌ها برای اجرای سریع‌تر

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Trading Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Commit & Push Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # شناسایی تغییرات در دیتابیس و مدل‌ها
        git add data/trading_bot.db
        if [ -d "src/models" ]; then git add src/models/*.pkl; fi
        
        # کامیت فقط در صورت وجود تغییرات واقعی
        if git diff --quiet && git diff --staged --quiet; then
          echo "هیچ تغییر جدیدی یافت نشد."
        else
          git commit -m "🚀 بروزرسانی دیتابیس و مدل ۱۰‌بعدی [Skip CI]"
          git push origin main
        fi
