name: Trading Bot - Live DB Update
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Set Permissions
        run: |
          mkdir -p data
          chmod -R 777 data/
          
      # 🛑 این مرحله حیاتی است: غیرفعال کردن IPv6 برای اتصال قطعی به دیتابیس
      - name: Force IPv4 (Disable IPv6)
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1
      
      - name: Run Bot
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          # تبدیل خودکار پورت به 6543 برای امنیت بیشتر
          if [[ "$DATABASE_URL" == *":5432"* ]]; then
            export DATABASE_URL="${DATABASE_URL//:5432/:6543}"
          fi
          python main.py
          
      - name: Commit and Push AI Parameters
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git add best_params.json 2>/dev/null || echo "No tracked files to add."
          
          if ! git diff --cached --quiet; then
            git commit -m "Update AI Parameters: $(date)"
            git push origin HEAD:${{ github.ref_name }} --force
          else
            echo "No changes detected in best_params.json."
          fi
