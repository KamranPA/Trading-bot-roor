Name: Trading Bot - Live DB Update
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Set Permissions
        run: |
          mkdir -p data
          chmod -R 777 data/
      
      - name: Run Bot
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python main.py
          
      - name: Commit and Push Database & AI Parameters
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 🛠️ اصلاح: اطمینان از اینکه فقط فایل‌های دیتابیس و تنظیمات استیج شوند
          git add data/*.db best_params.json 2>/dev/null || echo "No tracked files to add."
          
          # بررسی تغییرات
          if ! git diff --cached --quiet; then
            git commit -m "Update DB and AI Parameters: $(date)"
            
            # 🛠️ اصلاح حیاتی: استفاده از --force برای جلوگیری از خطای Rejected
            # استفاده از HEAD:${{ github.ref_name }} تضمین می‌کند همیشه روی شاخه درست پوش می‌شود
            git push origin HEAD:${{ github.ref_name }} --force
          else
            echo "No changes detected in DB or best_params.json."
          fi
