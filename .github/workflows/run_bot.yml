name: Crypto Trading Bot Execution

on:
  schedule:
    - cron: '*/30 * * * *' # بیدار شدن خودکار سرور هر ۳۰ دقیقه یک‌بار
  workflow_dispatch: # فعال بودن دکمه اجرای دستی

# 🔑 باز کردن قفل دسترسی توکن گیت‌هاب برای عملیات Push
permissions:
  contents: write

jobs:
  trading_job:
    runs-on: ubuntu-latest
    steps:
    # ۱. واکشی آخرین نسخه کدهای پروژه از گیت‌هاب
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # ۲. ایجاد پوشه دیتابیس در صورتی که وجود نداشته باشد
    - name: Create Data Directory
      run: mkdir -p data

    # ۳. نصب و راه‌اندازی زبان پایتون نسخه ۳.۱۱
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ۴. نصب کتابخانه‌های مورد نیاز از فایل requirements
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # ۵. جرقه زدن و اجرای موتور اصلی ربات تریدر در ریشه پروژه
    - name: Run Trading Bot Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    # ۶. ذخیره خودکار تغییرات دیتابیس روی گیت‌هاب
    - name: Commit and Push Database Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "github-actions[bot]"
        git add data/trading_bot.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 خلبان خودکار: به‌روزرسانی بانک اطلاعاتی معاملات [skip ci]" && git push)
