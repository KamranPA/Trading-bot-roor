name: Crypto Trading Bot Pipeline

on:
  schedule:
    - cron: '*/30 * * * *' # اجرای خودکار دقیقاً هر ۳۰ دقیقه یکبار
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-node: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Previous Session State (Database & ML Model)
      uses: actions/download-artifact@v4
      with:
        name: bot-runtime-state
        path: .
      continue-on-error: true # در اولین اجرا که آرتیفکتی نیست خطا صادر نمی‌کند

    - name: Run Trading Bot Logic & Position Manager
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        COINEX_API_KEY: ${{ secrets.COINEX_API_KEY }}
        COINEX_SECRET_KEY: ${{ secrets.COINEX_SECRET_KEY }}
      run: python main.py

    - name: Train and Update AI Model
      run: python -m src.train_model

    - name: Upload and Preserve Updated State for Next Run
      if: always() # حتی اگر ربات با خطا مواجه شد دیتابیس فعلی حفظ می‌شود
      uses: actions/upload-artifact@v4
      with:
        name: bot-runtime-state
        path: |
          trading_bot.db
          ml_models/
          best_params.json
        retention-days: 7
