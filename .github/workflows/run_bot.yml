name: Automated Crypto Trading Bot

on:
  schedule:
    # بازگرداندن زمان‌بندی ۳۰ دقیقه‌ای گیت‌هاب به عنوان لایه پشتیبان (در صورت عدم استفاده از کرون اکسترنال)
    - cron: '*/30 * * * *'
  workflow_dispatch: # امکان اجرای دستی از تب Actions یا فراخوانی توسط وب‌هوک اکسترنال

# مجوز حیاتی برای اینکه اکشنِ کامیت دیتابیس با خطای عدم دسترسی (Permission Denied) مواجه نشود
permissions:
  contents: write

jobs:
  trade_scanner:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests pandas; fi

    - name: Execute Trading Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    # کامیت هوشمند فایل دیتابیس برای حفظ تاریخچه لاگ‌ها و وضعیت فیلترها
    - name: Auto-Commit & Push Database Modifications
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "📊 ربات: به‌روزرسانی خودکار دیتابیس و لاگ اسکن‌ها [Skip CI]"
        file_pattern: 'data/trading_bot.db'
        branch: main
