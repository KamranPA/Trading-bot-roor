name: Trading Bot - Live DB Update
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # برای اجازه Push کردن فایل‌ها به مخزن
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      # 🛠️ رفع خطای Read-only database با تغییر دسترسی پوشه دیتابیس
      - name: Set Permissions
        run: |
          chmod -R 777 data/
      
      - name: Run Bot
        env:
          # 🛠️ رفع خطای ModuleNotFoundError با تعیین مسیر ریشه
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p data
          python main.py
          
      - name: Commit and Push Database & AI Parameters
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # استیج کردن تمام تغییرات (دیتابیس، پارامترها و...)
          git add .
          
          # بررسی اینکه آیا تغییراتی وجود دارد یا خیر
          if ! git diff --cached --quiet; then
            git commit -m "Update DB and AI Parameters: $(date)"
            
            # 🛠️ اصلاح نهایی: استفاده از force برای جلوگیری از خطای Rejected
            git push origin HEAD:${{ github.ref_name }} --force
          else
            echo "No changes detected in DB or best_params.json."
          fi
