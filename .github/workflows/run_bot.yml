name: Run Trading Bot

on:
  schedule:
    - cron: '*/30 * * * *' # اجرای خودکار ربات هر ۳۰ دقیقه
  workflow_dispatch: # امکان اجرای دستی

permissions:
  contents: write # مجوز رسمی برای ذخیره کردن و Push دیتابیس و مدل‌ها

jobs:
  run-bot-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        [span_93](start_span)token: ${{ secrets.GITHUB_TOKEN }}[span_93](end_span)

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        [span_94](start_span)python -m pip install --upgrade pip[span_94](end_span)
        pip install -r requirements.txt

    - name: Execute Trading Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Auto-Commit & Push Database & AI Models
      run: |
        [span_95](start_span)git config --local user.email "actions@github.com"[span_95](end_span)
        git config --local user.name "GitHub Actions"
        
        # 🟢 اصلاح حیاتی: اضافه کردن دیتابیس و فایل‌های هوش مصنوعی (در صورت وجود) به گیت
        if [ -f data/trading_bot.db ];
        [span_96](start_span)then[span_96](end_span)
          git add data/trading_bot.db
        fi
        
        if [ -d src/models ];
        [span_97](start_span)then[span_97](end_span)
          git add src/models/* ||
          [span_98](start_span)echo "هنوز مدلی ساخته نشده است"[span_98](end_span)
        fi
        
        # اگر تغییراتی در دیتابیس یا مغز مدل وجود داشت، همزمان Push کن
        git diff --quiet && git diff --staged --quiet ||
        (git commit -m "🗄️ سیستم: بروزرسانی لایو دیتابیس و فایل مدل هوش مصنوعی [Skip CI]" && git push) [span_99](start_span)
