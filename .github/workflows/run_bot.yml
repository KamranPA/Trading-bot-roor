name: Run Trading Bot

on:
  schedule:
    - cron: '*/30 * * * *' # اجرای خودکار ربات هر ۳۰ دقیقه
  workflow_dispatch: # امکان اجرای دستی از تب Actions

permissions:
  contents: write # 🟢 گام اول: باز کردن مجوز نوشتن روی ریپازیتوری برای گیت‌هاب اکشنز

jobs:
  run-bot-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true # 🟢 گام دوم: زنده نگه داشتن توکن گیت برای Push بعدی

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Trading Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Auto-Commit & Push Database Modifications
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # مانیتور کردن و اضافه کردن فیزیکی فایل دیتابیس به صف گیت
        git add data/trading_bot.db
        
        # ترفند طلایی ضد ارور: اگر دیتابیس تغییری نکرده بود ارور نده، اگر تغییر کرده بود کامیت و Push کن
        git diff --quiet && git diff --staged --quiet || (git commit -m "🗄️ دیتابیس: پوزیشن‌ها و لاگ‌های جدید بروزرسانی شدند [Skip CI]" && git push)
