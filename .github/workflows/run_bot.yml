name: Run Backtester

on:
  workflow_dispatch: 

jobs:
  backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests ccxt scikit-learn numpy joblib

      - name: Run Backtest
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # اجرای بک‌تستر
          python src/backtester.py

      # این بخش برای ذخیره کردن نتیجه در گیت‌هاب حیاتی است
      - name: Commit Backtest Results
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add backtest_summary.txt
          git commit -m "Auto-update backtest summary" || echo "No changes to commit"
          git push
