name: Run Trading Bot

on:
  schedule:
    - cron: '*/30 * * * *' # اجرای خودکار هر ۳۰ دقیقه
  workflow_dispatch: # امکان اجرای دستی

permissions:
  contents: write 

jobs:
  run-bot-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Trading Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Auto-Commit & Push Database & AI Models
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # افزودن فایل‌های دیتابیس و مدل‌های تولید شده توسط هوش مصنوعی
        git add -f data/trading_bot.db
        if [ -d "src/models" ]; then
          git add -f src/models/*
        fi
        
        # بررسی تغییرات: فقط در صورتی که فایلی تغییر کرده باشد کامیت انجام شود
        if ! git diff --cached --quiet; then
          git commit -m "🗄️ سیستم: بروزرسانی لایو دیتابیس و مدل‌های هوش مصنوعی [Skip CI]"
          git push origin main
        else
          echo "هیچ تغییر جدیدی برای کامیت یافت نشد."
        fi
