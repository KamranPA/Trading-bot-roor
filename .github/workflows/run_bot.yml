name: Run Trading Bot

on:
  schedule:
    - cron: '*/30 * * * *' # اجرای خودکار ربات هر ۳۰ دقیقه
  workflow_dispatch: # امکان اجرای دستی

permissions:
  contents: write # مجوز رسمی برای ذخیره کردن و Push دیتابیس و مدل‌ها

jobs:
  run-bot-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0 # 🟢 حیاتی: دانلود کامل تاریخچه برای حفظ فایل دیتابیس قبلی

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Trading Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Auto-Commit & Push Database & AI Models (Force Tracking)
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # مجبور کردن گیت به ردیابی و افزودن دیتابیس
        git add -f data/trading_bot.db
        
        if [ -d src/models ]; then
          git add -f src/models/* || echo "هنوز مدلی ساخته نشده است"
        fi
        
        git commit -m "🗄️ سیستم: بروزرسانی لایو دیتابیس و فاکتورهای هوش مصنوعی [Skip CI]" || echo "داده جدیدی برای همگام‌سازی یافت نشد"
        git push origin main
