name: Automated Crypto Trading Bot

on:
  workflow_dispatch: # بیدار شدن سیستم فقط به دستور دستی یا کرون‌جاب بیرونی

jobs:
  trade_scanner:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install requests

    - name: Execute Trading Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    # ذخیره تغییرات دیتابیس در گیت‌هاب بعد از پایان اسکن کرون‌جاب
    - name: Commit and Push Database Changes
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add trading_bot.db
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 ربات: دیتابیس و لاگ اسکن‌ها بروزرسانی شد" && git push)
