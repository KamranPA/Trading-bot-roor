name: Run Trading Bot

on:
  schedule:
    - cron: '*/30 * * * *' # اجرای خودکار ربات هر ۳۰ دقیقه
  workflow_dispatch: # امکان اجرای دستی

permissions:
  contents: write # مجوز رسمی برای ذخیره کردن و Push دیتابیس

jobs:
  run-bot-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Trading Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Auto-Commit & Push Database (Safe Tracking)
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # افزودن مطمئن و اجباری فایل دیتابیس
        git add -f data/trading_bot.db
        
        # بررسی امن وجود پوشه مدل‌ها برای جلوگیری از ارور fatal گیت
        if [ -d "src/models" ] && [ "$(ls -A src/models 2>/dev/null)" ]; then
          git add -f src/models/*
        fi
        
        # کامیت امن دیتابیس (اگر تغییری نبود ارور نمی‌دهد)
        git commit -m "🗄️ سیستم: بروزرسانی لایو دیتابیس نسخه ۳۶۰ [Skip CI]" || echo "داده جدیدی برای همگام‌سازی یافت نشد"
        
        # پوش کردن تغییرات به سرور اصلی گیت‌هاب
        git push origin main
