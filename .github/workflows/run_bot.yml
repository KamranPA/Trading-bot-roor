name: Run Trading Bot

on:
  schedule:
    - cron: '*/30 * * * *' # اجرای خودکار ربات هر ۳۰ دقیقه
  workflow_dispatch: # امکان اجرای دستی

permissions:
  contents: write # مجوز رسمی برای ذخیره کردن و Push دیتابیس

jobs:
  run-bot-job:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        # 🟢 بسیار مهم: استفاده از توکن پیش‌فرض گیت‌هاب برای دادن مجوز Push
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Trading Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    - name: Auto-Commit & Push Database Modifications
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        
        # 🟢 بررسی وجود پوشه دیتا و فایل دیتابیس
        if [ -f data/trading_bot.db ]; then
          git add data/trading_bot.db
          
          # اگر تغییراتی وجود داشت، کامیت و به سرور گیت‌هاب Push کن
          git diff --quiet && git diff --staged --quiet || (git commit -m "🗄️ دیتابیس: ذخیره پوزیشن‌ها و لاگ‌های جدید [Skip CI]" && git push)
        else
          echo "⚠️ فایل دیتابیس یافت نشد!"
        fi
