name: Core Trading Bot Pipeline

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # بازیابی دیتابیس از آخرین اجرای موفق
    - name: Restore Previous Session State
      uses: dawidd6/action-download-artifact@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        name: bot-runtime-state
        path: .
      continue-on-error: true # اگر اولین بار باشد، خطا نگیرد و ادامه دهد

    - name: Run Trading Bot Logic
      env:
        PYTHONPATH: ${{ github.workspace }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # اطمینان از اینکه اسکریپت در مسیر درست اجرا می‌شود
        python main.py

    # آپلود مجدد دیتابیس برای اجرای بعدی
    - name: Upload and Preserve Updated State
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bot-runtime-state
        path: |
          trading_bot.db
          best_params.json
          src/models/
        retention-days: 7
