# ---------------------------------------------------------
# FILE PATH: .github/workflows/core_trading_bot.yml
# ---------------------------------------------------------
name: Core Trading Bot Pipeline

on:
  schedule:
    # اجرا هر ۳۰ دقیقه یکبار
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Restore Previous Session State
      uses: actions/download-artifact@v4
      with:
        name: bot-runtime-state
        path: .
      continue-on-error: true

    - name: Run Trading Bot Logic
      env:
        PYTHONPATH: ${{ github.workspace }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # پاکسازی کش برای اطمینان از اجرای کدهای جدید
        find . -name "*.pyc" -delete
        python main.py

    - name: Upload and Preserve Updated State
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bot-runtime-state
        path: |
          trading_bot.db
          best_params.json
          src/models/
        retention-days: 7
