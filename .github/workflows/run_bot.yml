name: Trading Bot - Live DB Update
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Setup Data Directory
        run: |
          mkdir -p data/4h
          chmod -R 777 data/

      # ✅ FIX: این مرحله اضافه شد. قبلاً data/4h در این ورک‌فلو خالی می‌ماند
      # (چون هیچ‌کدام از مراحل قبلی fetcher.py را اجرا نمی‌کردند)، و وقتی
      # هر ۵۰ معامله run_auto_optimization() داخل main.py صدا زده می‌شد،
      # optimizer.py روی هیچ داده‌ای اجرا می‌شد و best_params.json را با
      # یک dict عملاً خالی بازنویسی و commit می‌کرد. حالا هر اجرا داده‌ی
      # تازه دارد، هم برای اسکن سیگنال و هم برای خودارتقایی دوره‌ای.
      - name: Fetch Market Data
        run: |
          echo "📂 working directory: $(pwd)"
          python fetcher.py

      - name: Test DB Write
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python test_db.py
      - name: Run Bot
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
      - name: Commit and Push AI Parameters + Models
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -f "best_params.json" ]; then
            git add best_params.json
          fi
          if [ -f "ai_thresholds.json" ]; then
            git add ai_thresholds.json
          fi
          # ✅ FIX: قبلاً وقتی run_auto_optimization() داخل main.py هر ۵۰
          # معامله train_model.py را اجرا می‌کرد، مدل‌های .pkl تازه روی
          # دیسک runner ساخته می‌شدند ولی هرگز commit نمی‌شدند — یعنی با
          # پایان یافتن job، بازآموزی زنده کاملاً از دست می‌رفت و اجرای
          # بعدی (checkout تازه) دوباره از مدل‌های قدیمی شروع می‌کرد.
          if compgen -G "src/models/*.pkl" > /dev/null; then
            git add -f src/models/*.pkl
          fi
          if ! git diff --cached --quiet; then
            git commit -m "Auto-Update: AI Parameters/Models $(date +'%Y-%m-%d %H:%M')"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes detected in parameters/models."
          fi
