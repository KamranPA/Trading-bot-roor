# ---------------------------------------------------------
# FILE NAME: main.yml
# FILE PATH: .github/workflows/main.yml
# ---------------------------------------------------------
name: Trading Bot Engine

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # ارتقا به نسخه ۳.۱۰ برای سازگاری بهتر با کتابخانه‌ها

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests scikit-learn joblib
          pip install pandas-ta --use-deprecated=legacy-resolver || pip install pandas-ta

      - name: Run Trading Engine
        run: python main.py

      - name: Commit and Push Results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # اضافه کردن فایل‌های نتایج به محیط گیت
          git add backtest_summary.txt best_params.json data/trading_bot.db
          
          # تایید تغییرات و ارسال به سرور در صورت وجود تغییر جدید
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Bot results and database" && git push)
