name: Automated Crypto Trading Bot

on:
  # ۱. بازگرداندن زمان‌بندی ۳۰ دقیقه‌ای گیت‌هاب (اگر از کرون اکسترنال استفاده می‌کنی این بخش ضرری ندارد)
  schedule:
    - cron: '*/30 * * * *'
  # امکان اجرای دستی و اکسترنال
  workflow_dispatch:

# ۲. اضافه کردن مجوز حیاتی برای اینکه اکشنِ کامیت دیتابیس ارور ندهد
permissions:
  contents: write

jobs:
  trade_scanner:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # استفاده از همان توکن پیش‌فرض گیت‌هاب با اکشن v4 شما
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # نصب کتابخانه‌ها از روی فایل requirements شما
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests pandas ta-lib; fi

    - name: Execute Trading Engine
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python main.py

    # ۳. کامیت هوشمند دیتابیس با همان اکشن مورد نظر شما
    - name: Auto-Commit & Push Database Modifications
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "📊 ربات: به‌روزرسانی خودکار دیتابیس و لاگ اسکن‌ها [Skip CI]"
        file_pattern: 'data/trading_bot.db'
        # مطمئن شو که اسم برنچ اصلی‌ات دقیقا main است (اگر master است، به master تغییرش بده)
        branch: main
