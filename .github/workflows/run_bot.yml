name: Trading Bot - Live DB Update
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # برای اجازه Push کردن فایل‌ها به مخزن
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - run: pip install -r requirements.txt
      
      - name: Run Bot
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          mkdir -p data
          python main.py
          
      - name: Commit and Push Database & AI Parameters
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # استیج کردن هر دو فایل دیتابیس و پارامترهای بهینه‌ساز هوش مصنوعی
          git add data/trading_bot.db best_params.json
          
          # بررسی اینکه آیا تغییراتی برای کامیت وجود دارد یا خیر
          if ! git diff --cached --quiet; then
            git commit -m "Update DB and AI Parameters: $(date)"
            git push
          else
            echo "No changes detected in DB or best_params.json."
          fi
