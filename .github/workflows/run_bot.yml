name: Trading Bot - Live DB Update
on:
  schedule:
    - cron: '*/30 * * * *' # اجرای ربات هر ۳۰ دقیقه
  workflow_dispatch:
jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Setup Data Directory
        run: |
          mkdir -p data/4h
          chmod -R 777 data/
          
      - name: Run Bot
        env:
          PYTHONPATH: ${{ github.workspace }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python main.py
          
      - name: Commit and Push AI Parameters
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # optimizer فایل best_params.json را در ریشه پروژه می‌نویسد
          if [ -f "best_params.json" ]; then
            git add best_params.json
          fi
          
          if ! git diff --cached --quiet; then
            git commit -m "Auto-Update: AI Parameters $(date +'%Y-%m-%d %H:%M')"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes detected in parameters."
          fi
