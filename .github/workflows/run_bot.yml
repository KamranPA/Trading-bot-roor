# File Path: .github/workflows/run_bot.yml
name: Crypto Trading Bot Pipeline

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Previous Session State
      uses: actions/download-artifact@v4
      with:
        name: bot-runtime-state
        path: .
      continue-on-error: true

    - name: Run Trading Bot Logic & Position Manager
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        COINEX_API_KEY: ${{ secrets.COINEX_API_KEY }}
        COINEX_SECRET_KEY: ${{ secrets.COINEX_SECRET_KEY }}
      run: python main.py

    - name: Train and Update AI Model
      run: python -m src.train_model
      continue-on-error: true

    - name: Upload and Preserve Updated State
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bot-runtime-state
        path: |
          **/*.db
          **/*.json
        if-no-files-found: ignore
