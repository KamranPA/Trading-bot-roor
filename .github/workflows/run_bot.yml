name: Trading Bot - Live DB Update
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      # این بخش برای دیتابیس ابری دیگر لازم نیست اما برای جلوگیری از خطا دست نمی‌زنیم
      - name: Set Permissions
        run: |
          mkdir -p data
          chmod -R 777 data/
      
      - name: Run Bot
        env:
          PYTHONPATH: ${{ github.workspace }}
          # 🟢 اضافه کردن آدرس دیتابیس ابری
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # سایر متغیرهای لازم را اینجا اضافه کنید
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          # 🛠️ اصلاح داینامیک: تبدیل خودکار پورت به 6543 در صورتی که در سکرت اشتباهاً 5432 باشد
          if [[ "$DATABASE_URL" == *":5432"* ]]; then
            export DATABASE_URL="${DATABASE_URL//:5432/:6543}"
          fi
          python main.py
          
      - name: Commit and Push AI Parameters
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 🛠️ اصلاح: دیتابیس دیگر فایل نیست، فقط پارامترهای AI را پوش می‌کنیم
          git add best_params.json 2>/dev/null || echo "No tracked files to add."
          
          # بررسی تغییرات
          if ! git diff --cached --quiet; then
            git commit -m "Update AI Parameters: $(date)"
            git push origin HEAD:${{ github.ref_name }} --force
          else
            echo "No changes detected in best_params.json."
          fi
